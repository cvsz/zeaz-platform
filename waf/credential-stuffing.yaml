version: 1
plan_gating:
  enterprise_features:
    - bot_management
    - advanced_rate_limiting
  fallback_on_non_enterprise:
    - strict_rate_limit
    - js_challenge
rules:
  - id: credential-stuffing-auth-path
    action: js_challenge
    expression: "(http.request.uri.path contains \"/login\" or http.request.uri.path contains \"/auth\" or http.request.uri.path contains \"/oauth\") and (cf.threat_score gt 15 or cf.bot_management.score lt 20)"
  - id: credential-stuffing-high-frequency
    action: managed_challenge
    expression: "(http.request.uri.path contains \"/api/v1/auth/login\" or http.request.uri.path contains \"/identity/verify\") and http.request.method eq \"POST\" and (cf.threat_score gt 10 or cf.bot_management.score lt 30)"
