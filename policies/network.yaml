version: 1
primary_domain_from: PRIMARY_DOMAIN
required_host_labels:
  - auth
  - zveo
  - studio
  - analytics
  - app
  - pay
  - treasury
  - admin-wallet
network_guardrails:
  origin_source: ORIGIN_HOSTS
  origin_rules:
    - no_public_ips: true
    - require_tls_or_internal_dns: true
    - require_dr_pairing: true
  egress_policy_notes:
    - Restrict connector egress to Cloudflare tunnel endpoints only.
    - Restrict origin egress to explicit upstream dependencies.
  tunnel_health_validation:
    command: bash scripts/tunnel-validate.sh --offline
  rollback_steps:
    - Re-apply previous known-good Terraform state.
    - Restore previous dns/records.yaml and tunnels/config.yaml from Git.
    - Re-run bash scripts/tunnel-validate.sh --offline.
    - Confirm DNS propagation and origin health checks before reopening traffic.
