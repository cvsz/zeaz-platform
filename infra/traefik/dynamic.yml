http:
  routers:
    zdash-web:
      rule: "Host(`zdash.zeaz.dev`)"
      service: zdash-web-service
    zdash-api:
      rule: "Host(`api-zdash.zeaz.dev`)"
      service: zdash-api-service
    zwallet-web:
      rule: "Host(`app.zeaz.dev`)"
      service: zwallet-web-service
    zwallet-api:
      rule: "Host(`api-apps.zeaz.dev`) || Host(`api-app.zeaz.dev`)"
      service: zwallet-api-service
    zeaz-web:
      rule: "Host(`zeaz.dev`) || Host(`www.zeaz.dev`)"
      service: zeaz-web-service
    zaiz-web:
      rule: "Host(`zaiz.zeaz.dev`)"
      service: zaiz-web-service


  services:
    zdash-web-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:5173"
    zdash-api-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:8005"
    zwallet-web-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:4173"
    zwallet-api-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:8080"
    zeaz-web-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:3000"
    zaiz-web-service:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:4103"

  middlewares:
    auth:
      forwardAuth:
        address: "http://server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
    global-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: https
          X-Service-ID: traefik-gateway
          X-Request-ID: ""
          X-Trace-ID: ""
    securityHeaders:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
