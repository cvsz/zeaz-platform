name: zai-coder

services:
  zai-coder:
    build:
      context: ../../apps/zai-coder
      dockerfile: Dockerfile
    image: zai-coder:local
    container_name: zeaz-zai-coder
    restart: unless-stopped
    environment:
      ZAI_ENV: "${ENVIRONMENT:-prod}"
      ZAI_LOG_LEVEL: "${ZAI_LOG_LEVEL:-INFO}"
      ZAI_PORT: "${ZAI_CODER_PORT:-8090}"
      # Pass through AI provider keys from platform .env
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      - "127.0.0.1:${ZAI_CODER_PORT:-8090}:8090"
    volumes:
      - zai_coder_data:/app/data
      - zai_coder_config:/app/config
    networks:
      default:
      proxy:
        aliases:
          - zai-coder
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zai-coder.rule=Host(`zai.zeaz.dev`)"
      - "traefik.http.routers.zai-coder.entrypoints=websecure"
      - "traefik.http.routers.zai-coder.tls.certresolver=cloudflare"
      - "traefik.http.services.zai-coder.loadbalancer.server.port=8090"
    healthcheck:
      test: ["CMD", "python3", "-c", "import zai_coder; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  zai_coder_data:
  zai_coder_config:

networks:
  proxy:
    external: true
