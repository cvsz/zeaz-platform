name: zai-coder

services:
  zai-coder:
    build:
      context: ../../apps/zai-coder
      dockerfile: Dockerfile.production
    image: zai-coder:local
    container_name: zeaz-zai-coder
    restart: unless-stopped
    environment:
      ZAI_ENV: "${ENVIRONMENT:-prod}"
      ZAI_LOG_LEVEL: "${ZAI_LOG_LEVEL:-INFO}"
      # AI provider keys passed through from platform .env
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      # Bind to all interfaces so Traefik can reach via 172.18.0.1:8765
      - "0.0.0.0:${ZAI_CODER_PORT:-8765}:8765"
    volumes:
      - zai_coder_data:/app/data
      - zai_coder_config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  zai_coder_data:
  zai_coder_config:
