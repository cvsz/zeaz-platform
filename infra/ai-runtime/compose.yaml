---
services:
  pgvector:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    environment:
      POSTGRES_USER: $${DB_USER:-ai_user}
      POSTGRES_PASSWORD: $${DB_PASS:-ai_pass}
      POSTGRES_DB: $${DB_NAME:-ai_runtime}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - ai_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${DB_NAME} -U $${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ai_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: $${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: $${MINIO_ROOT_PASSWORD:-admin12345}
    volumes:
      - minio_data:/data
    networks:
      - ai_internal
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`s3.zeaz.dev`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.middlewares=auth@file"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`s3-console.zeaz.dev`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"
      - "traefik.http.routers.minio-console.middlewares=auth@file"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  langgraph-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    working_dir: /app
    volumes:
      - ./app:/app
    environment:
      - DATABASE_URL=postgresql://$${DB_USER:-ai_user}:$${DB_PASS:-ai_pass}@pgvector:5432/$${DB_NAME:-ai_runtime}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=$${OPENAI_API_KEY}
    networks:
      - ai_internal
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langgraph.rule=Host(`ai.zeaz.dev`)"
      - "traefik.http.routers.langgraph.entrypoints=websecure"
      - "traefik.http.routers.langgraph.tls=true"
      - "traefik.http.routers.langgraph.middlewares=auth@file"
      - "traefik.http.services.langgraph.loadbalancer.server.port=8000"

  langgraph-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python worker.py
    working_dir: /app
    volumes:
      - ./app:/app
    environment:
      - DATABASE_URL=postgresql://$${DB_USER:-ai_user}:$${DB_PASS:-ai_pass}@pgvector:5432/$${DB_NAME:-ai_runtime}
      - REDIS_URL=redis://redis:6379/0
    networks:
      - ai_internal

volumes:
  pgvector_data:
  redis_data:
  minio_data:

networks:
  ai_internal:
    internal: true
  proxy:
    external: true
