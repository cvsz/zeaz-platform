services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal_proxy
    deploy:
      resources:
        limits:
          memory: 50M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  internal_proxy:
    internal: true
