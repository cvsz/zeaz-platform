tunnel: ${CLOUDFLARE_TUNNEL_ID}
credentials-file: /etc/cloudflared/${CLOUDFLARE_TUNNEL_ID}.json
metrics: 0.0.0.0:2000
no-autoupdate: true
ingress:
  - hostname: panel.zeaz.dev
    service: http://meta-os-panel:3007
  - hostname: api.zeaz.dev
    service: http://api-gateway:8007
  - hostname: auth.zeaz.dev
    service: http://authentik:9443
  - hostname: grafana.zeaz.dev
    service: http://grafana:3010
  - hostname: loki.zeaz.dev
    service: http://loki:3100
  - hostname: prometheus.zeaz.dev
    service: http://prometheus:9091
  - hostname: trader.zeaz.dev
    service: http://trader-api:8100
  - hostname: ws.trader.zeaz.dev
    service: http://trader-ws:8101
  - hostname: risk.zeaz.dev
    service: http://risk-engine:8104
  - hostname: memory.zeaz.dev
    service: http://memory-engine:8109
  - hostname: agents.zeaz.dev
    service: http://ai-coordinator:8106
  - service: http_status:404
