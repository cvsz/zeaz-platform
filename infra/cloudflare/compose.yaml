---
services:
  cloudflared:
    image: cloudflare/cloudflared:2024.4.1
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
