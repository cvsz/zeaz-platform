global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'authentik'
    static_configs:
      - targets: ['server:9000', 'worker:9000']

  - job_name: 'langgraph-api'
    static_configs:
      - targets: ['langgraph-api:8000']
