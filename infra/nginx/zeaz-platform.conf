# ZEAZ canonical local reverse proxy map. Generated for operator review.
# Install by symlinking/copying into an nginx conf.d/sites-enabled location and running nginx -t.
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

proxy_read_timeout 120s;
proxy_send_timeout 120s;
client_max_body_size 50m;

server { listen 80; server_name zow.zeaz.dev; location / { proxy_pass http://127.0.0.1:4101; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }
