name: terraform-plan
on:
  pull_request:
    paths:
      - 'cloudflare-platform/terraform/**'
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=cloudflare-platform/terraform init -backend=false -input=false
      - run: terraform -chdir=cloudflare-platform/terraform validate
      - run: terraform -chdir=cloudflare-platform/terraform plan -input=false
