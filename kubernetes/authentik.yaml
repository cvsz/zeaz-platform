apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2024.2.2
          command: ["server"]
          envFrom:
            - secretRef:
                name: authentik-secrets
          ports:
            - containerPort: 9000
            - containerPort: 9443
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: authentik
spec:
  selector:
    app: authentik-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9000
    - protocol: TCP
      port: 443
      targetPort: 9443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: auth.zeaz.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik
                port:
                  number: 80
  tls:
    - hosts:
        - auth.zeaz.dev
      secretName: authentik-tls
