name: cloudflare-pr-gates

on:
  pull_request:
    branches: ["main"]
    paths:
      - "infra/cloudflare/**"
      - "docs/infra/cloudflare*"
      - "terraform/**"
      - "opentofu/**"
      - "workers/**"
      - ".github/workflows/**"
      - "scripts/workflow-policy.sh"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-static-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Run CI PR Gates
        run: infra/cloudflare/scripts/check-ci-pr-gates.sh --strict
      - name: Check Cloudflare PR Scope
        run: infra/cloudflare/scripts/check-pr-cloudflare-scope.sh --strict

  cloudflare-secret-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Run Secret Leak Scan
        run: infra/cloudflare/scripts/check-secret-leaks.sh --strict

  cloudflare-worker-route-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Scan Workers Routes
        run: infra/cloudflare/scripts/scan-workers-routes.sh --strict
      - name: Check Wrangler Examples
        run: infra/cloudflare/scripts/check-wrangler-examples.sh --strict

  cloudflare-dns-ownership-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Scan DNS Ownership
        run: infra/cloudflare/scripts/scan-dns-ownership.sh --strict

  workflow-policy-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Check Workflow Policy
        run: make workflow-policy

  terraform-readonly-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Format
        run: terraform fmt -check -recursive terraform/
      - name: Terraform Validate
        run: |
          for dir in $(find terraform -type f -name "*.tf" -exec dirname {} \; | sort -u); do
            echo "Validating $dir"
            cd "$dir"
            terraform init -backend=false
            terraform validate
            cd -
          done
