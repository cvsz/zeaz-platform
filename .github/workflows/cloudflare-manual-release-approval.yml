name: Cloudflare Manual Release Approval

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/cloudflare/**"
      - "docs/infra/cloudflare-phase12-*.md"
      - "docs/infra/cloudflare-phase11-*.md"
      - ".github/workflows/cloudflare-manual-release-approval.yml"
      - ".github/workflows/cloudflare-release-readiness.yml"
      - "scripts/workflow-policy.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-manual-release-approval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  approval-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Bash syntax check
        run: bash -n scripts/workflow-policy.sh && bash -n infra/cloudflare/scripts/*.sh

      - name: Workflow policy check
        run: scripts/workflow-policy.sh

      - name: Phase 11 release readiness check
        run: infra/cloudflare/scripts/check-release-readiness.sh --strict --no-live

      - name: Phase 12 approval evidence structure check
        run: infra/cloudflare/scripts/check-manual-release-approval.sh --strict
