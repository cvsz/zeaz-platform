name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'opentofu/**'
      - 'scripts/**'
      - '.github/workflows/terraform-plan.yml'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}   # fix: pin all steps to repo root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      # fix: load secrets into GITHUB_ENV so every subsequent step inherits them
      - name: Load environment
        env:
          # Cloudflare credentials — injected from GitHub secrets
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID:         ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          CF_DNS_TOKEN:       ${{ secrets.CF_DNS_TOKEN }}
          CF_ZT_TOKEN:        ${{ secrets.CF_ZT_TOKEN }}
          CF_WORKERS_TOKEN:   ${{ secrets.CF_WORKERS_TOKEN }}
          CF_WAF_TOKEN:       ${{ secrets.CF_WAF_TOKEN }}
          CF_TUNNEL_TOKEN:    ${{ secrets.CF_TUNNEL_TOKEN }}
          CF_R2_TOKEN:        ${{ secrets.CF_R2_TOKEN }}
          CF_AUDIT_TOKEN:     ${{ secrets.CF_AUDIT_TOKEN }}
          CF_AI_GATEWAY_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          CF_AI_GATEWAY_SLUG: ${{ secrets.CF_AI_GATEWAY_SLUG }}
          # Script behaviour
          STRICT_ENV: "true"
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/cloudflare/load-env.sh"
          "$GITHUB_WORKSPACE/scripts/cloudflare/load-env.sh"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      # fix: CF_* vars are now available via GITHUB_ENV — no need to re-declare them here
      - name: Run Terraform plan
        env:
          ENVIRONMENT:    dev
          PRIMARY_DOMAIN: zeaz.dev
          CONFIRM_APPLY:  "no"
        run: make tf-plan

      - name: Upload Terraform plan artifacts
        if: ${{ hashFiles('terraform/**/*.tfplan', 'terraform/**/plan-*.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            terraform/**/*.tfplan
            terraform/**/plan-*.txt
          if-no-files-found: warn
