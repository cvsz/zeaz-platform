name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'opentofu/**'
      - 'scripts/**'
      - '.github/workflows/terraform-plan.yml'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Terraform fmt check
        run: make tf-fmt-check

      - name: Terraform validate
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID || '00000000000000000000000000000000' }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CF_ZONE_ID || '00000000000000000000000000000000' }}
          TF_VAR_cloudflare_bootstrap_token: ${{ secrets.CF_API_TOKEN || 'ci-validation-token-not-used-for-network-calls' }}
          TF_VAR_primary_domain: zeaz.dev
        run: make tf-validate

      - name: Terraform plan
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ENVIRONMENT: dev
          PRIMARY_DOMAIN: zeaz.dev
          CONFIRM_APPLY: "no"
          TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CF_ZONE_ID }}
          TF_VAR_cloudflare_bootstrap_token: ${{ secrets.CF_API_TOKEN }}
          TF_VAR_primary_domain: zeaz.dev
        run: |
          missing=0
          for var in TF_VAR_cloudflare_account_id TF_VAR_cloudflare_zone_id TF_VAR_cloudflare_bootstrap_token; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required secret-backed Terraform variable: $var"
              missing=$((missing + 1))
            fi
          done
          (( missing == 0 )) || exit 1
          make tf-plan

      - name: Explain skipped Terraform plan
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo "Terraform validate completed."
          echo "Terraform plan is skipped for pull_request events because secrets are intentionally unavailable."
          echo "Run this workflow manually after configuring CF_ACCOUNT_ID, CF_ZONE_ID, and CF_API_TOKEN to execute terraform plan."

      - name: Upload Terraform plan artifacts
        if: ${{ hashFiles('terraform/**/*.tfplan', 'terraform/**/plan-*.txt') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-artifacts
          path: |
            terraform/**/*.tfplan
            terraform/**/plan-*.txt
          if-no-files-found: warn
