name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'opentofu/**'
      - 'scripts/**'
      - '.github/workflows/terraform-plan.yml'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Run Terraform plan
        env:
          ENVIRONMENT: dev
          PRIMARY_DOMAIN: zeaz.dev
          CONFIRM_APPLY: no
        run: make tf-plan

      - name: Upload Terraform plan artifacts
        if: ${{ hashFiles('terraform/**/*.tfplan', 'terraform/**/plan-*.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            terraform/**/*.tfplan
            terraform/**/plan-*.txt
          if-no-files-found: ignore
