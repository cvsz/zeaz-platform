name: security-ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Install backend dependencies for audit
        run: |
          cd backend
          if [ -f pyproject.toml ]; then
            pip install -e '.[dev]'
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'No backend dependency manifest found; skipping backend dependency install.'
          fi

      - name: Python audit non-blocking
        run: |
          cd backend
          pip-audit || true

      - name: NPM audit non-blocking
        run: |
          cd frontend
          npm install --legacy-peer-deps --no-audit --fund=false
          npm audit --audit-level=high || true

      - name: Secret pattern scan
        run: |
          python - <<'PY'
          from __future__ import annotations
          import re
          import sys
          from pathlib import Path

          root = Path('.')
          skip_dirs = {'.git', 'node_modules', '.venv', 'dist', 'build', '.next', '.cache', '__pycache__'}
          skip_suffixes = {'.png', '.jpg', '.jpeg', '.gif', '.webp', '.ico', '.pdf', '.zip', '.gz', '.tar', '.tgz', '.lock'}
          patterns = [
              re.compile(r'AKIA[0-9A-Z]{16}'),
              re.compile(r'-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----'),
              re.compile(r'xox[baprs]-[A-Za-z0-9-]+'),
              re.compile(r'sk_live_[0-9a-zA-Z]+'),
          ]
          findings: list[str] = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              if path.suffix.lower() in skip_suffixes:
                  continue
              try:
                  text = path.read_text(encoding='utf-8', errors='ignore')
              except Exception:
                  continue
              for idx, line in enumerate(text.splitlines(), start=1):
                  if any(p.search(line) for p in patterns):
                      findings.append(f'{path}:{idx}: potential secret pattern')
          if findings:
              print('\n'.join(findings))
              sys.exit(1)
          print('No blocked secret patterns found.')
          PY

      - name: Ensure only example env files tracked
        run: |
          forbidden=$(find . -maxdepth 3 -name '.env*' \
            ! -path './.git/*' \
            ! -name '.env.example' \
            ! -name '.env.production.example' \
            ! -name 'env.safe.example' \
            | tr '\n' ' ')
          if [ -n "$forbidden" ]; then
            echo "Unexpected env files present: $forbidden"
            exit 1
          fi
