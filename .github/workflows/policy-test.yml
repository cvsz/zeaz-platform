name: Policy Testing

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: policy-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}

      - name: Execute policy tests
        run: python3 -m pytest -q tests/test_fintech_policy.py tests/test_identity_policy.py tests/test_ai_policy.py
