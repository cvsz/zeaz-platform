name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Manual run reason
        required: false
        default: manual
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck && make shellcheck

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Build and Test compose configs
        run: |
          docker compose -f infra/traefik/compose.yaml config
          docker compose -f infra/authentik/compose.yaml config
          docker compose -f infra/ai-runtime/compose.yaml config
          docker compose -f infra/observability/compose.yaml config
