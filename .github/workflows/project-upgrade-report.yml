name: Project Upgrade Report

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'python/**'
      - 'tests/**'
      - 'docs/**'
      - 'tunnels/**'
      - '.env.example'
      - 'README.md'
      - 'Makefile'
      - '.github/workflows/project-upgrade-report.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-upgrade-report-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    env:
      ENVIRONMENT: dev
      PRIMARY_DOMAIN: zeaz.dev
      TERRAFORM_BACKEND_TYPE: local
      COST_LOCK: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install pytest pyyaml
          fi

      - name: Generate upgrade report
        run: bash scripts/project-upgrade-report.sh

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: project-upgrade-report
          path: reports/project-upgrade-report.md
          if-no-files-found: error
