name: validate

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.2

      - name: Run CI validation
        run: make validate-agent

      - name: Run shellcheck for AI scripts
        run: |
          if find scripts/ai -type f -name '*.sh' -print -quit | grep -q .; then
            find scripts/ai -type f -name '*.sh' -print0 | xargs -0 shellcheck
          else
            echo "No scripts/ai shell scripts found; skipped"
          fi
