name: Tunnel Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tunnel-validation-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  tunnel-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Validate tunnel configuration
        run: scripts/tunnel-validate.sh

      - name: Upload tunnel validation artifacts
        if: ${{ hashFiles('reports/tunnel/**', 'tunnels/**/*.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-validation-artifacts
          path: |
            reports/tunnel
            tunnels/**/*.json
          if-no-files-found: ignore
