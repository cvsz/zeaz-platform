name: DR Testing

on:
  schedule:
    - cron: '30 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dr-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dr-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}

      - name: Run runbook tests
        run: python3 -m pytest tests/test_runbooks.py

      - name: Upload DR artifacts
        if: ${{ hashFiles('backups/snapshots/**', 'reports/dr/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dr-testing-artifacts
          path: |
            backups/snapshots
            reports/dr
          if-no-files-found: ignore
