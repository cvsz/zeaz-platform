name: worker-route-validation

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform validate

  validate-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: terraform-validate
    steps:
      - uses: actions/checkout@v7
      - name: Scan Workers Routes
        run: infra/cloudflare/scripts/scan-workers-routes.sh --strict
      - name: Check Wrangler Examples
        run: infra/cloudflare/scripts/check-wrangler-examples.sh --strict