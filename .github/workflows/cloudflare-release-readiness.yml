name: Cloudflare Release Readiness

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/cloudflare/**"
      - "docs/infra/cloudflare*"
      - "terraform/**"
      - "opentofu/**"
      - "workers/**"
      - ".github/workflows/**"
      - "scripts/workflow-policy.sh"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

permissions:
  contents: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: bash -n infra/cloudflare/scripts/*.sh && bash -n scripts/workflow-policy.sh
      - name: Check release readiness
        run: infra/cloudflare/scripts/check-release-readiness.sh --strict --no-live
      - name: Generate release evidence
        run: infra/cloudflare/scripts/generate-release-evidence.sh --markdown --strict --output docs/infra/cloudflare-phase11-release-evidence.md
      - name: Check for evidence drift
        run: git diff --exit-code docs/infra/cloudflare-phase11-release-evidence.md
