name: Cloudflare Runtime Baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - infra/cloudflare/**
      - docs/infra/cloudflare-*.md
      - workers/**
      - terraform/**
      - opentofu/**
      - scripts/workflow-policy.sh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-runtime-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-baseline:
    name: runtime-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Bash syntax check
        run: |
          bash -n scripts/workflow-policy.sh
          bash -n infra/cloudflare/scripts/*.sh

      - name: Run workflow policy
        run: scripts/workflow-policy.sh

      - name: Run existing Cloudflare safe scanners
        run: |
          if [ -x infra/cloudflare/scripts/check-secret-leaks.sh ]; then
            infra/cloudflare/scripts/check-secret-leaks.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/scan-dns-ownership.sh ]; then
            infra/cloudflare/scripts/scan-dns-ownership.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/scan-workers-routes.sh ]; then
            infra/cloudflare/scripts/scan-workers-routes.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/check-wrangler-examples.sh ]; then
            infra/cloudflare/scripts/check-wrangler-examples.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/check-ci-pr-gates.sh ]; then
            infra/cloudflare/scripts/check-ci-pr-gates.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/check-release-readiness.sh ]; then
            infra/cloudflare/scripts/check-release-readiness.sh --strict --no-live
          fi
          if [ -x infra/cloudflare/scripts/check-manual-release-approval.sh ]; then
            infra/cloudflare/scripts/check-manual-release-approval.sh --strict
          fi
          if [ -x infra/cloudflare/scripts/check-break-glass-governance.sh ]; then
            infra/cloudflare/scripts/check-break-glass-governance.sh --strict
          fi

      - name: Phase 14 Runtime Baseline Checks
        run: |
          chmod +x infra/cloudflare/scripts/*.sh || true
          infra/cloudflare/scripts/check-runtime-baseline.sh --strict
          infra/cloudflare/scripts/compare-runtime-baseline.sh --strict
          infra/cloudflare/scripts/validate-cloudflare-config.sh \
            --check \
            --secrets \
            --workers \
            --release-readiness \
            --manual-release-governance \
            --break-glass-governance \
            --runtime-baseline
