name: Secrets Scanning

on:
  push:
    branches: [ main, security/* ]
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Scan history as well

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Gitleaks is free for open source and runs as a container action
