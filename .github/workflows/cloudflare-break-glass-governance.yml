name: Cloudflare Break-Glass Governance

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/cloudflare/**"
      - "docs/infra/cloudflare-phase13-*.md"
      - "docs/infra/cloudflare-phase12-*.md"
      - "docs/infra/cloudflare-ci-pr-gates.md"
      - "scripts/workflow-policy.sh"
      - ".github/workflows/cloudflare-break-glass-governance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-break-glass-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  break-glass-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Validate Bash Syntax
        run: |
          bash -n scripts/workflow-policy.sh
          bash -n infra/cloudflare/scripts/*.sh

      - name: Workflow Policy Validation
        run: |
          scripts/workflow-policy.sh

      - name: Check Phase 10 CI PR Gates
        run: |
          if [ -x infra/cloudflare/scripts/check-ci-pr-gates.sh ]; then
            infra/cloudflare/scripts/check-ci-pr-gates.sh --strict
          fi

      - name: Check Phase 11 Release Readiness
        run: |
          if [ -x infra/cloudflare/scripts/check-release-readiness.sh ]; then
            infra/cloudflare/scripts/check-release-readiness.sh --strict --no-live
          fi

      - name: Check Phase 12 Manual Approval Governance
        run: |
          if [ -x infra/cloudflare/scripts/check-manual-release-approval.sh ]; then
            infra/cloudflare/scripts/check-manual-release-approval.sh --strict
          fi

      - name: Check Phase 13 Break-Glass Governance
        run: |
          infra/cloudflare/scripts/check-break-glass-governance.sh --strict
