name: Security Scanning

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  secret-scanning:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Run gitleaks secret scanning
        run: make secret-scan

  security-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: secret-scanning
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Run security scan suite
        run: make security-scan

      - name: Upload security outputs
        if: ${{ hashFiles('artifacts.sbom.spdx.json', '**/semgrep*.sarif', '**/trivy*.sarif', '**/gitleaks*.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-artifacts
          path: |
            artifacts.sbom.spdx.json
            **/semgrep*.sarif
            **/trivy*.sarif
            **/gitleaks*.json
          if-no-files-found: ignore
