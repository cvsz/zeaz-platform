name: Deploy ZeaZ Studio Dashboard to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths:
      - "apps/zeaz-studio-dashboard/**"
      - ".github/workflows/deploy-zeaz-studio-dashboard-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: zeaz-studio-dashboard-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/zeaz-studio-dashboard
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: zeaz-studio-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          npx wrangler pages project create "${CF_PAGES_PROJECT_NAME}" --production-branch=master || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/zeaz-studio-dashboard
          command: pages deploy dist --project-name=zeaz-studio-dashboard --branch=${{ github.ref_name }} --commit-dirty=true
