name: Rotate Secrets

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate-secrets:
    runs-on: ubuntu-24.04
    env:
      SECRET_ROTATION_INTERVAL: "30"
      SOPS_AGE_KEY: "dummy-key-for-ci-validation"
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}
      - name: Execute secret rotation workflow
        run: bash scripts/rotate-secrets.sh
