name: Drift Detection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drift-detect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-detect:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}

      - name: Set drift detection environment
        run: |
          {
            echo "ENVIRONMENT=prod"
            echo "PRIMARY_DOMAIN=zeaz.dev"
          } >> "$GITHUB_ENV"

      - name: Detect drift
        run: make drift-detect
