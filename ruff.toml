line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "ARG"]
ignore = [
  "E501",  # line-length handled by formatter
  "SIM117", # allow nested with statements for readability
]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
