name: Auto Sync and Validate ShipGenAI

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate repo health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo summary
        run: |
          echo "🚀 ShipGenAI Repository Summary"
          echo "================================="
          echo "Total files: $(find . -not -path './.git/*' -type f | wc -l)"
          echo "Categories: $(ls -d */ 2>/dev/null | grep -v '.git' | wc -l)"
          echo "Website: https://shipgenai.org"
