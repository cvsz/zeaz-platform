name: zeaz-production-baseline

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-zeaz}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: zeaz
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-zeaz}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse.sql:/docker-entrypoint-initdb.d/001_zeaz.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    environment:
      NATS_PASSWORD: ${NATS_PASSWORD:?NATS_PASSWORD is required}
    command: ["--config", "/etc/nats/nats.conf"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data/jetstream
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-gateway
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDRESS: :8080
      POSTGRES_DSN: postgres://${POSTGRES_USER:-zeaz}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zeaz}?sslmode=disable
      REDIS_ADDRESS: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: zeaz-network
      TENANT_REQUIRED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-1200}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-200}
      NATS_URL: nats://zeaz:${NATS_PASSWORD}@nats:4222
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  analytics:
    build:
      context: ..
      dockerfile: Dockerfile
      target: analytics
    restart: unless-stopped
    environment:
      NATS_URL: nats://zeaz:${NATS_PASSWORD}@nats:4222
      CLICKHOUSE_DSN: http://${CLICKHOUSE_USER:-zeaz}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/zeaz
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  compliance:
    build:
      context: ..
      dockerfile: Dockerfile
      target: compliance
    restart: unless-stopped
    environment:
      COMPLIANCE_HTTP_ADDRESS: :8082
      BLOCKED_COUNTRIES: TH,CN
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  nats-data:
