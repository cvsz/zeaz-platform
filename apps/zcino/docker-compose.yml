services:
  zcino:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8090"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zcino.rule=Host(`zcino.zeaz.dev`)"
      - "traefik.http.routers.zcino.entrypoints=web"
      - "traefik.http.services.zcino.loadbalancer.server.port=8090"
    restart: unless-stopped

networks:
  proxy:
    external: true
