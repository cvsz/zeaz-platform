syntax = "proto3";

package zeaz.interop.v8;

option go_package = "game-catalog-service/internal/interop/protocol;protocol";

service Interop {
  rpc RequestTask(Task) returns (Response);
}

message Task {
  string id = 1;
  string type = 2;
  double budget = 3;
  string origin = 4;
  int64 deadline_unix = 5;
}

message Response {
  bool accepted = 1;
  double score = 2;
  string reason = 3;
}
