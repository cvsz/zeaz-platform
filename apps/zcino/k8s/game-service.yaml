apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: game
  template:
    metadata:
      labels:
        app: game
    spec:
      containers:
        - name: game
          image: zeaz/game:latest
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_ADDRESS
              value: ":8080"
            - name: NATS_URL
              value: "nats://nats:4222"
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
spec:
  selector:
    app: game
  ports:
    - name: http
      port: 8080
      targetPort: 8080
