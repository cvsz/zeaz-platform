name: ztrader CD Deployment Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-smoke-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker Image (Dry Run)
        run: |
          if [ -f apps/ztrader/backend/Dockerfile ]; then
            docker build --dry-run -f apps/ztrader/backend/Dockerfile apps/ztrader/backend/
          else
            echo "API Dockerfile not present; skipped"
          fi

      - name: Build Web Docker Image (Dry Run)
        run: |
          if [ -f apps/ztrader/frontend/Dockerfile ]; then
            docker build --dry-run -f apps/ztrader/frontend/Dockerfile apps/ztrader/frontend/
          else
            echo "Web Dockerfile not present; skipped"
          fi
