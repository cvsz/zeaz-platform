services:
  api:
    build: .
    volumes:
      - .:/app
      - ../../runtime:/app/runtime:ro
      - ../../:/home/zeazdev/zeaz-platform:ro
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/runtime/services')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zeaz-api.rule=Host(`api.zeaz.dev`)"
      - "traefik.http.routers.zeaz-api.entrypoints=websecure"
      - "traefik.http.routers.zeaz-api.tls=true"
      - "traefik.http.routers.zeaz-api.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.services.zeaz-api.loadbalancer.server.port=8000"
    restart: unless-stopped

networks:
  proxy:
    external: true
