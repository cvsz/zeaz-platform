apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zlms-prod
spec:
  project: default
  source:
    repoURL: https://github.com/cvsz/zlms-prod.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-sigstore-signatures
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "*"
          attestors:
            - entries:
                - keyless:
                    subject: "*"
                    issuer: "https://token.actions.githubusercontent.com"
