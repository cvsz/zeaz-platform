server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /var/lib/z-runner/promtail-positions.yaml
clients:
  - url: ${LOKI_PUSH_URL}
scrape_configs:
  - job_name: z-runner
    static_configs:
      - targets: [localhost]
        labels:
          job: z-runner
          __path__: /var/log/z-runner/*.log
