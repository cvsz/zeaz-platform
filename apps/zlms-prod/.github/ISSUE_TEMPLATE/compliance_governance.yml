name: Compliance or governance task
description: Track audit evidence, policy remediation, dependency governance, provenance, or platform compliance work.
title: "[Compliance]: "
labels:
  - compliance
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for governance tasks that require traceable evidence. Do not attach confidential audit materials unless the repository and issue visibility are approved for that data.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I verified the issue can be tracked in this repository without exposing restricted evidence or secrets.
          required: true
        - label: I identified the required control, evidence, deadline, or audit request.
          required: true
        - label: I included validation criteria for closure.
          required: true
  - type: dropdown
    id: governance_area
    attributes:
      label: Governance area
      multiple: true
      options:
        - Branch protection
        - CodeQL
        - Semgrep
        - Trivy / vulnerability scanning
        - SBOM
        - SLSA provenance
        - Artifact signing / Cosign
        - Dependabot / dependency review
        - License validation
        - Secrets management
        - Audit logging
        - Access review / least privilege
        - Runtime hardening
        - Kubernetes policy
        - Docker hardening
        - Incident response readiness
        - Documentation
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the requested governance outcome or audit requirement.
    validations:
      required: true
  - type: textarea
    id: control_mapping
    attributes:
      label: Control mapping
      description: Map to policy, framework, standard, or audit request.
      placeholder: "SOC 2 CC6.1, ISO 27001 A.8, SLSA L3, OWASP ASVS Level 2, internal policy ID..."
    validations:
      required: true
  - type: textarea
    id: current_state
    attributes:
      label: Current state
      description: Summarize existing implementation, evidence, gaps, and known limitations.
    validations:
      required: true
  - type: textarea
    id: required_changes
    attributes:
      label: Required changes
      description: List engineering, process, documentation, or evidence changes needed.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Required evidence
      description: Define expected artifacts, scan results, policy outputs, logs, screenshots, attestations, or links.
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Deadline or review date
      description: Provide date and timezone if applicable.
      placeholder: "2026-05-31 UTC"
  - type: textarea
    id: risks
    attributes:
      label: Risks and dependencies
      description: Note blockers, system owners, required approvals, external dependencies, and implementation risks.
    validations:
      required: true
  - type: textarea
    id: closure
    attributes:
      label: Closure criteria
      description: Define exactly what must be true before this task can be closed.
    validations:
      required: true
