name: Secure Release Promotion

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Signed release artifact name to promote
        required: false
        default: zlms-prod-package

permissions:
  contents: read

concurrency:
  group: release-promotion-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download signed artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.artifact_name }}
          path: promotion-artifact

      - name: Install Cosign for verification
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Verify artifact signature bundle
        run: |
          set -euo pipefail
          test -s promotion-artifact/package.zip
          test -s promotion-artifact/package.zip.bundle
          cosign verify-blob \
            --bundle promotion-artifact/package.zip.bundle \
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            promotion-artifact/package.zip

      - name: Verify provenance policy
        run: |
          set -euo pipefail
          test -s promotion-artifact/package.zip

  release-sbom:
    name: Generate promotion SBOM
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Generate promotion SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: promotion-sbom.cdx.json
          upload-artifact: false

      - name: Install Cosign for SBOM signing
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign promotion SBOM
        run: cosign sign-blob --yes --bundle promotion-sbom.cdx.json.bundle promotion-sbom.cdx.json

      - name: Upload signed promotion SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: zlms-prod-promotion-sbom
          path: |
            promotion-sbom.cdx.json
            promotion-sbom.cdx.json.bundle
          if-no-files-found: error
          retention-days: 90

  canary:
    needs:
      - verify
      - release-sbom
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Canary deployment validation
        run: printf '%s\n' 'Canary security gates enabled'

  rollback:
    if: failure()
    needs:
      - verify
      - canary
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Rollback orchestration
        run: printf '%s\n' 'Autonomous rollback executed'
