name: Regression Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  regression-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run existing Python security regressions
        run: python3 -m unittest discover -s tests/security -p 'test_*.py'

      - name: Run generated logging regression tests
        run: python3 tests/logging/FormLoggingTests.cs

      - name: Run generated SQL injection regression tests
        run: python3 tests/security/SqlInjectionRegressionTests.cs

      - name: Run generated file upload security tests
        run: python3 tests/security/FileUploadSecurityTests.cs

      - name: Run generated auth bypass regression tests
        run: python3 tests/security/AuthBypassTests.cs

      - name: Run generated error disclosure regression tests
        run: python3 tests/security/ErrorDisclosureTests.cs
