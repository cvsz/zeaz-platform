name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable
      - run: echo validate

  tests-platform-remediation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: tests/platform/go.sum

      - name: Verify Docker SDK chain remediated
        run: |
          set -euo pipefail
          if go mod graph | grep -q 'github.com/docker/docker'; then
            echo 'vulnerable dependency github.com/docker/docker is present in module graph'
            exit 1
          fi

      - name: Verify OTel SDK baseline
        run: |
          set -euo pipefail
          ver="$(go list -m go.opentelemetry.io/otel/sdk | awk '{print $2}')"
          echo "resolved otel/sdk version: ${ver}"
          case "${ver}" in
            v1.4[3-9]*|v1.[5-9]*|v2*) ;;
            *)
              echo 'otel/sdk version below required patched baseline (>= v1.43.0)'
              exit 1
              ;;
          esac

      - name: Unit/contract/chaos and coverage gate
        run: |
          set -euo pipefail
          go test ./internal/... ./unit ./contract ./chaos -coverprofile=coverage.out -covermode=count
          go run ./cmd/coveragegate coverage.out 85

      - name: Validate Testcontainers integration compatibility
        run: |
          set -euo pipefail
          go test -tags=integration ./integration -run '^$'

  tests-platform-supply-chain-hardening:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: tests/platform/go.sum

      - name: Generate SBOM
        run: ./scripts/generate_sbom.sh

      - name: Run govulncheck and dependency vulnerability gate
        run: ./scripts/vuln_gate.sh

      - name: Verify build artifacts and module integrity
        run: ./scripts/verify_artifacts.sh

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tests-platform-supply-chain-artifacts
          path: |
            tests/platform/artifacts/sbom.cdx.json
            tests/platform/artifacts/sbom.cdx.json.sha256
            tests/platform/artifacts/govulncheck.json

  tests-platform-security-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: tests/platform/go.sum

      - name: Regression policy unit tests
        run: go test ./internal/securitypolicy -v

      - name: Dependency drift guard
        run: ./scripts/dependency_drift_guard.sh

      - name: Security regression gate
        run: ./scripts/security_regression_gate.sh
