apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payment-service
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - payment
  selector:
    matchLabels:
      app: payment-service
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: payment-service-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: payment-service
    rules:
    - alert: PaymentServiceHighErrorRate
      expr: sum(rate(http_server_requests_total{service="payment-service",status=~"5.."}[5m])) / sum(rate(http_server_requests_total{service="payment-service"}[5m])) > 0.03
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: Payment service high error rate
        description: 5xx error ratio is above 3% for 10 minutes.
    - alert: PaymentServiceHighLatency
      expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{service="payment-service"}[5m])) by (le)) > 1.5
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: Payment service high p95 latency
        description: P95 latency is above 1.5s for 10 minutes.
