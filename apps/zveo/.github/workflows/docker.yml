name: docker

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            dockerfile: apps/zeaz-api-gateway/Dockerfile
          - image: render-worker
            dockerfile: apps/render-worker/Dockerfile
          - image: dashboard
            dockerfile: apps/dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }} image
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            docker build -f "${{ matrix.dockerfile }}" .
            echo "- ${{ matrix.image }} build succeeded." >> "$GITHUB_STEP_SUMMARY"
          else
            if [ "${{ matrix.image }}" = "dashboard" ]; then
              echo "- dashboard Dockerfile not present; skipped." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Required Dockerfile missing: ${{ matrix.dockerfile }}" >&2
              exit 1
            fi
          fi
      - name: Status summary
        run: |
          {
            echo '### Docker status';
            echo '- Docker build step completed for matrix target.';
          } >> "$GITHUB_STEP_SUMMARY"
