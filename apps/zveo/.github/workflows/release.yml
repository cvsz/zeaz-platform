name: release
on:
  push:
    tags: ['v*.*.*']
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
            context: .
          - image: render-worker
            dockerfile: apps/render-worker/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zveo-${{ matrix.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize infra/kubernetes/production
      - run: kubectl apply --server-side -k infra/kubernetes/production
