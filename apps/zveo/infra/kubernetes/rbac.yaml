apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zveo-read-config
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zveo-api-read-config
subjects:
  - kind: ServiceAccount
    name: zveo-api
roleRef:
  kind: Role
  name: zveo-read-config
  apiGroup: rbac.authorization.k8s.io
