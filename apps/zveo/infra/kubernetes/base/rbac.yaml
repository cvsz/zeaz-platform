apiVersion: v1
kind: ServiceAccount
metadata:
  name: zveo-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zveo-api-config-reader
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zveo-api-config-reader
subjects:
  - kind: ServiceAccount
    name: zveo-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zveo-api-config-reader
