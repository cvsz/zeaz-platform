apiVersion: apps/v1
kind: Deployment
metadata:
  name: zveo-api-gateway
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/component: api-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway }
      annotations: { prometheus.io/scrape: "true", prometheus.io/path: /metrics, prometheus.io/port: "8080" }
    spec:
      serviceAccountName: zveo-api
      containers:
        - name: api-gateway
          image: ghcr.io/example/zveo-api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080, name: http }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "8080" }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: zveo-secrets, key: redis-url } }
            - name: AUTH_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: zveo-secrets, key: auth-shared-secret } }
            - name: S3_BUCKET
              valueFrom: { configMapKeyRef: { name: zveo-config, key: s3-bucket } }
          readinessProbe: { httpGet: { path: /readyz, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: zveo-api-gateway
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway }
spec:
  selector: { app.kubernetes.io/component: api-gateway }
  ports: [{ name: http, port: 80, targetPort: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zveo-api-gateway
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: zveo-api-gateway }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
