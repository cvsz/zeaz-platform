apiVersion: apps/v1
kind: Deployment
metadata:
  name: zveo-render-worker
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: render-worker }
spec:
  replicas: 4
  selector: { matchLabels: { app.kubernetes.io/component: render-worker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: render-worker }
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: render-worker
          image: ghcr.io/example/zveo-render-worker:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: NODE_ENV, value: production }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: zveo-secrets, key: redis-url } }
            - { name: CONCURRENCY, value: "2" }
            - { name: HEARTBEAT_MS, value: "10000" }
            - { name: PROVIDER_TIMEOUT_MS, value: "900000" }
          resources:
            requests: { cpu: "1", memory: 2Gi, nvidia.com/gpu: "0" }
            limits: { cpu: "4", memory: 8Gi, nvidia.com/gpu: "1" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zveo-render-worker
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: zveo-render-worker }
  minReplicas: 4
  maxReplicas: 100
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
