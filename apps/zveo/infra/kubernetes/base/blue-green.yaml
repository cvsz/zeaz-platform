apiVersion: v1
kind: Service
metadata:
  name: zveo-api-gateway-preview
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway, deployment.zveo.io/channel: preview }
spec:
  selector:
    app.kubernetes.io/component: api-gateway
    deployment.zveo.io/color: green
  ports: [{ name: http, port: 80, targetPort: http }]
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: zveo-api-gateway
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/component: api-gateway } }
  strategy:
    blueGreen:
      activeService: zveo-api-gateway
      previewService: zveo-api-gateway-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 600
      prePromotionAnalysis:
        templates: [{ templateName: zveo-api-smoke }]
  template:
    metadata:
      labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway, deployment.zveo.io/color: green }
      annotations: { prometheus.io/scrape: "true", prometheus.io/path: /metrics, prometheus.io/port: "8080" }
    spec:
      serviceAccountName: zveo-api
      containers:
        - name: api-gateway
          image: ghcr.io/example/zveo-api-gateway:1.0.0
          ports: [{ containerPort: 8080, name: http }]
          envFrom: [{ configMapRef: { name: zveo-config } }]
          readinessProbe: { httpGet: { path: /readyz, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
