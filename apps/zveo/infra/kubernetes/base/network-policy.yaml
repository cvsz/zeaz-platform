apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zveo-default-deny
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: security }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zveo-api-gateway-ingress
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: api-gateway }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: api-gateway }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: prometheus } }
      ports: [{ protocol: TCP, port: 8080 }]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: redis } }
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ ipBlock: { cidr: 0.0.0.0/0 } }]
      ports: [{ protocol: TCP, port: 443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zveo-render-worker-egress
  labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: render-worker }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: render-worker }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: redis } }
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ ipBlock: { cidr: 0.0.0.0/0 } }]
      ports: [{ protocol: TCP, port: 443 }]
