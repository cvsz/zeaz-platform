apiVersion: apps/v1
kind: Deployment
metadata:
  name: zveo-api-gateway
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          env:
            - name: LOG_FORMAT
              value: json
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: QUEUE_MONITORING_ENABLED
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities: { drop: ["ALL"] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zveo-render-worker
spec:
  template:
    spec:
      containers:
        - name: render-worker
          env:
            - name: LOG_FORMAT
              value: json
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: PROVIDER_RETRY_BASE_DELAY_MS
              value: "1000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities: { drop: ["ALL"] }
