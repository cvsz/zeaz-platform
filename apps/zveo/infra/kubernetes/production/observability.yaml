apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: {}
      memory_limiter: { limit_mib: 512, spike_limit_mib: 128, check_interval: 1s }
    exporters:
      prometheus: { endpoint: 0.0.0.0:9464 }
      otlp/tempo: { endpoint: tempo:4317, tls: { insecure: true } }
      logging: { verbosity: basic }
    service:
      pipelines:
        traces: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/tempo, logging] }
        metrics: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [prometheus] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/component: otel-collector } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: zveo, app.kubernetes.io/component: otel-collector }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "9464", prometheus.io/path: /metrics }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/etc/otel/otel-collector.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: metrics, containerPort: 9464 }
          volumeMounts: [{ name: config, mountPath: /etc/otel }]
          readinessProbe: { httpGet: { path: /, port: 13133 }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 768Mi }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata: { name: otel-collector }
spec:
  selector: { app.kubernetes.io/component: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: metrics, port: 9464, targetPort: metrics }
