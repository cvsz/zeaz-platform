services:
  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["127.0.0.1:9090:9090"]
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/zveo.json:ro
    ports: ["127.0.0.1:3000:3000"]
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
    ports: ["127.0.0.1:3100:3100"]
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports: ["127.0.0.1:3200:3200", "127.0.0.1:4317:4317", "127.0.0.1:4318:4318"]
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol/config.yml:ro
    ports: ["127.0.0.1:9464:9464", "127.0.0.1:4319:4318"]
