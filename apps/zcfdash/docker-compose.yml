services:
  zcfdash:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zcfdash.rule=Host(`zcfdash.zeaz.dev`)"
      - "traefik.http.routers.zcfdash.entrypoints=web"
      - "traefik.http.services.zcfdash.loadbalancer.server.port=80"
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zcfdash-api.rule=Host(`zcfdash.zeaz.dev`) && PathPrefix(`/api`)"
      - "traefik.http.routers.zcfdash-api.entrypoints=web"
      - "traefik.http.services.zcfdash-api.loadbalancer.server.port=8000"

networks:
  proxy:
    external: true
