services:
  zcfdash:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zcfdash.rule=Host(`zcfdash.zeaz.dev`)"
      - "traefik.http.routers.zcfdash.entrypoints=web"
      - "traefik.http.services.zcfdash.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
