services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.zeaz-api.rule=Host(`api.zeaz.dev`)"
      - "traefik.http.routers.zeaz-api.entrypoints=web"
      - "traefik.http.services.zeaz-api.loadbalancer.server.port=8000"
    restart: unless-stopped

networks:
  proxy:
    external: true
