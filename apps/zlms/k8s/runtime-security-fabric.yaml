apiVersion: v1
kind: Namespace
metadata:
  name: zlms-runtime-security
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime-security-fabric
  namespace: zlms-runtime-security
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-security-policy
  namespace: zlms-runtime-security
data:
  rollout.json: |
    {
      "strategy": "canary",
      "trafficSteps": [1, 10, 25, 50, 100],
      "rollback": {
        "freezeCanary": true,
        "publishPreviousSignedManifestPointer": true,
        "quarantineThreat": true,
        "invalidateSessions": true
      },
      "attestation": {
        "requireImageDigest": true,
        "requireSbomDigest": true,
        "requireSignedSlsaProvenance": true,
        "requireReadOnlyFilesystem": true,
        "requireNonRoot": true
      }
    }
  telemetry.json: |
    {
      "openTelemetry": "https://otel-collector.zlms.svc.cluster.local:4318",
      "siem": "https://siem-ingest.zlms.svc.cluster.local/runtime",
      "falco": "falco.runtime.svc.cluster.local",
      "ebpf": "runtime-sensor.zlms.svc.cluster.local"
    }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: zlms-runtime-security-fabric
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - expression: "has(object.metadata.labels) && object.metadata.labels.exists(key, key == 'runtime.zlms.io/zero-trust')"
      message: "zLMS runtime workloads must opt into the zero-trust runtime fabric label."
    - expression: "object.kind != 'Pod' || (has(object.spec.securityContext) && has(object.spec.securityContext.runAsNonRoot) && object.spec.securityContext.runAsNonRoot == true)"
      message: "runAsNonRoot: true is required for runtime workloads."
    - expression: "object.kind != 'Pod' || object.spec.containers.all(container, has(container.securityContext) && has(container.securityContext.readOnlyRootFilesystem) && container.securityContext.readOnlyRootFilesystem == true)"
      message: "readOnlyRootFilesystem: true is required for every runtime container."
    - expression: "object.kind != 'Pod' || object.spec.containers.all(container, has(container.securityContext) && (!has(container.securityContext.privileged) || container.securityContext.privileged == false))"
      message: "Privileged containers are forbidden."
    - expression: "object.kind != 'Pod' || object.spec.containers.all(container, container.image.contains('@sha256:'))"
      message: "Runtime container images must be immutable digest references."
    - expression: "object.kind != 'Pod' || object.spec.containers.all(container, has(container.resources) && has(container.resources.requests) && has(container.resources.limits))"
      message: "Runtime containers must define resource requests and limits."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: zlms-runtime-security-fabric
spec:
  policyName: zlms-runtime-security-fabric
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - zlms
            - zlms-runtime-security
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runtime-security-fabric-deny-by-default
  namespace: zlms-runtime-security
spec:
  podSelector:
    matchLabels:
      runtime.zlms.io/zero-trust: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zlms
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zlms-observability
      ports:
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runtime-security-fabric
  namespace: zlms-runtime-security
spec:
  minAvailable: 1
  selector:
    matchLabels:
      runtime.zlms.io/zero-trust: "true"
