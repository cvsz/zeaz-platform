- rule: ZRunner Crypto Miner Or Scanner
  desc: Detect crypto miners and network scanners in runner workloads
  condition: spawned_process and container and k8s.ns.name = z-runner and proc.name in (xmrig, minerd, masscan, nmap, zmap)
  output: "z-runner suspicious process (user=%user.name command=%proc.cmdline container=%container.id image=%container.image.repository)"
  priority: CRITICAL
  tags: [z-runner, crypto, scanner, zero-trust]

- rule: ZRunner Privilege Escalation Attempt
  desc: Detect privileged operations inside runner pods
  condition: container and k8s.ns.name = z-runner and (evt.type in (setuid,setgid,capset) or proc.name in (sudo, su, setcap))
  output: "z-runner privilege escalation attempt (user=%user.name command=%proc.cmdline container=%container.id)"
  priority: CRITICAL
  tags: [z-runner, privilege-escalation]

- rule: ZRunner Unexpected Shell Network Egress
  desc: Detect shell-driven outbound connections from runner jobs
  condition: outbound and container and k8s.ns.name = z-runner and proc.name in (bash, sh, zsh, python, perl, ruby, nc, curl, wget)
  output: "z-runner shell network egress (command=%proc.cmdline connection=%fd.name container=%container.id)"
  priority: WARNING
  tags: [z-runner, egress]
