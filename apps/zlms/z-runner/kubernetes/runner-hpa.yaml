apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: z-runner
  namespace: z-runner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: z-runner
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
