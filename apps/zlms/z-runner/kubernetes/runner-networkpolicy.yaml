apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: z-runner-egress-github-only
  namespace: z-runner
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: z-runner
  policyTypes: ["Ingress", "Egress"]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 140.82.112.0/20
        - ipBlock:
            cidr: 143.55.64.0/20
        - ipBlock:
            cidr: 185.199.108.0/22
        - ipBlock:
            cidr: 192.30.252.0/22
      ports:
        - protocol: TCP
          port: 443
