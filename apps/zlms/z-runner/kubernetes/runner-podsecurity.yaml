apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: z-runner-restricted-pods
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-restricted-runner-pods
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["z-runner"]
      validate:
        message: "z-runner pods must run rootless, non-privileged, read-only and without host namespace access."
        pattern:
          spec:
            =(hostNetwork): "false"
            =(hostPID): "false"
            =(hostIPC): "false"
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
