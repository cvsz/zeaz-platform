name: Security Control Plane

on:
  workflow_dispatch:
    inputs:
      remediation_mode:
        description: Canary remediation mode
        required: true
        type: choice
        default: queue-only
        options:
          - queue-only
          - canary
          - rollback-test
  pull_request:
    branches:
      - main
    paths-ignore:
      - security/events/**
      - security/state/**
      - security/reports/**
  push:
    branches:
      - main
    paths-ignore:
      - security/events/**
      - security/state/**
      - security/reports/**
  schedule:
    - cron: '17 */6 * * *'

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: security-control-plane-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  policy-gate:
    name: Policy Gate, DAG, Lock, and Rate Limit
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 15
    outputs:
      started_at: ${{ steps.clock.outputs.started_at }}
    steps:
      - name: Reject recursive autonomous refs
        env:
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$REF_NAME" == autonomous/* || "$REF_NAME" == security-control-plane/* ]]; then
            echo "Recursive security-control-plane branch execution is blocked: $REF_NAME" >&2
            exit 78
          fi
          if [[ "$EVENT_NAME" != "workflow_dispatch" && "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Recursive bot-triggered execution is blocked" >&2
            exit 78
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22.21.1'

      - name: Capture start time
        id: clock
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Apply deterministic workflow rate limit
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bucket=$(( 0x$(printf '%s' "$REF_NAME" | sha256sum | cut -c1-2) % 90 ))
          echo "Rate-limit bucket delay: ${bucket}s"
          sleep "$bucket"

      - name: Initialize DAG and acquire workflow lock
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          node --experimental-strip-types security/control-plane/orchestrator.ts initialize
          node --experimental-strip-types security/control-plane/orchestrator.ts acquire-lock

      - name: Upload DAG and policy artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-control-plane-policy-${{ github.run_id }}
          path: |
            security/reports/governance-dag.json
            security/events/security-event-bus.jsonl
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  codeql:
    name: CodeQL SARIF (${{ matrix.language }})
    needs: policy-gate
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    env:
      CODEQL_OVERLAY_DATABASE_MODE: none
      CODEQL_ACTION_OVERLAY_ANALYSIS: 'false'
      CODEQL_ACTION_OVERLAY_ANALYSIS_CSHARP: 'false'
      CODEQL_ACTION_OVERLAY_ANALYSIS_JAVASCRIPT: 'false'
      CODEQL_ACTION_OVERLAY_ANALYSIS_CODE_SCANNING_CSHARP: 'false'
      CODEQL_ACTION_OVERLAY_ANALYSIS_CODE_SCANNING_JAVASCRIPT: 'false'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild compiled CodeQL language
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@87557b9c84dde89fdd9b10e88954ac2f4248e463
      - name: Prepare CodeQL SARIF directory
        run: mkdir -p security/sarif
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463
        with:
          category: security-control-plane/codeql/${{ matrix.language }}
          output: security/sarif/codeql-${{ matrix.language }}
          upload: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sarif-codeql-${{ matrix.language }}-${{ github.run_id }}
          path: security/sarif/codeql-${{ matrix.language }}
          if-no-files-found: warn
          retention-days: 30

  semgrep:
    name: Semgrep SARIF
    needs: policy-gate
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Semgrep-compatible Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install pinned Semgrep CLI
        env:
          SEMGREP_VERSION: 1.162.0
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir "semgrep==${SEMGREP_VERSION}"
          semgrep --version
      - name: Run Semgrep once
        env:
          SEMGREP_SEND_METRICS: 'off'
        run: |
          set -euo pipefail
          if ! command -v semgrep >/dev/null 2>&1; then
            echo "Semgrep CLI was not installed on PATH. Use the installed semgrep binary instead of the deprecated Python module entry point." >&2
            exit 2
          fi
          mkdir -p security/sarif
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --sarif \
            --metrics=off \
            --timeout 60 \
            --max-memory 4096 \
            --jobs 4 \
            --output security/sarif/semgrep.sarif \
            .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sarif-semgrep-${{ github.run_id }}
          path: security/sarif/semgrep.sarif
          if-no-files-found: error
          retention-days: 30

  trivy-fs:
    name: Trivy Filesystem SARIF
    needs: policy-gate
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run Trivy once
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: security/sarif/trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sarif-trivy-fs-${{ github.run_id }}
          path: security/sarif/trivy-fs.sarif
          if-no-files-found: error
          retention-days: 30

  secret-scan:
    name: Secret Scan SARIF
    needs: policy-gate
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run deterministic secret scan
        run: |
          set -euo pipefail
          mkdir -p security/sarif
          python3 - <<'PY'
          import json, pathlib, re
          patterns = [("hardcoded-secret", re.compile(r"(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][^'\"]{8,}"))]
          excludes = {'.git', 'node_modules', 'vendor', 'dist', 'build'}
          results = []
          for path in pathlib.Path('.').rglob('*'):
              if not path.is_file() or any(part in excludes for part in path.parts):
                  continue
              try:
                  text = path.read_text(errors='ignore')
              except Exception:
                  continue
              for lineno, line in enumerate(text.splitlines(), 1):
                  for rule, pattern in patterns:
                      if pattern.search(line):
                          results.append({"ruleId": rule, "level": "error", "message": {"text": "Potential hardcoded secret detected; verify and move to OIDC or managed secret storage."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": str(path)}, "region": {"startLine": lineno}}}]})
          sarif = {"version": "2.1.0", "$schema": "https://json.schemastore.org/sarif-2.1.0.json", "runs": [{"tool": {"driver": {"name": "security-control-plane-secret-scan", "rules": [{"id": "hardcoded-secret", "shortDescription": {"text": "Potential hardcoded secret"}}]}}, "results": results}]}
          pathlib.Path('security/sarif/secret-scan.sarif').write_text(json.dumps(sarif, indent=2))
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sarif-secret-scan-${{ github.run_id }}
          path: security/sarif/secret-scan.sarif
          if-no-files-found: error
          retention-days: 30

  sbom:
    name: Central SBOM and Provenance
    needs: policy-gate
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Prepare SBOM output directory
        run: mkdir -p security/sbom

      - name: Generate central CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: security/sbom/cyclonedx-repository.json
          upload-artifact: false
      - name: Install Cosign for SBOM signing
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign central SBOM with Cosign keyless identity
        run: |
          set -euo pipefail
          mkdir -p security/artifacts
          cosign sign-blob --yes --bundle security/artifacts/sbom.bundle security/sbom/cyclonedx-repository.json
          sha256sum security/sbom/cyclonedx-repository.json > security/artifacts/sbom.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-provenance-${{ github.run_id }}
          path: |
            security/sbom/cyclonedx-repository.json
            security/artifacts/sbom.sha256
            security/artifacts/sbom.bundle
          if-no-files-found: error
          retention-days: 90
          compression-level: 9

  aggregate-and-remediate:
    name: SARIF Aggregation, Queue, Canary, Metrics
    needs:
      - policy-gate
      - codeql
      - semgrep
      - trivy-fs
      - secret-scan
      - sbom
    if: always() && needs.policy-gate.result == 'success'
    runs-on:
      - self-hosted
      - linux
      - secure
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22.21.1'
      - name: Download scanner artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p security/sarif security/sbom security/artifacts
          gh run download "$RUN_ID" --pattern 'sarif-*' --dir security/artifacts/downloaded || true
          find security/artifacts/downloaded -name '*.sarif' -type f -exec cp {} security/sarif/ \; 2>/dev/null || true
      - name: Aggregate SARIF once and deduplicate queue
        env:
          CANARY_REMEDIATION_LIMIT: 5
        run: |
          set -euo pipefail
          node --experimental-strip-types security/control-plane/orchestrator.ts aggregate-sarif
          node --experimental-strip-types security/control-plane/orchestrator.ts queue-remediation
      - name: PR deduplication guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          open_count=$(gh pr list --state open --head security-control-plane/canary --json number --jq 'length' || echo 0)
          if [[ "$open_count" -gt 0 ]]; then
            echo "Existing security-control-plane canary PR detected; duplicate remediation PR creation is blocked."
          fi
      - name: Evaluate canary rollback and record metrics
        env:
          SECURITY_CANARY_STATUS: ${{ job.status }}
          SECURITY_CONTROL_PLANE_ELAPSED_MINUTES: ${{ fromJSON(format('{0}', github.run_attempt)) }}
          GITHUB_HEAD_REF: ${{ github.head_ref || github.ref_name }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          node --experimental-strip-types security/control-plane/orchestrator.ts rollback
          node --experimental-strip-types security/control-plane/orchestrator.ts metrics
      - name: Upload aggregate SARIF once
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463
        with:
          sarif_file: security/sarif/aggregate.sarif
          category: security-control-plane/aggregate
      - name: Upload immutable control-plane artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-control-plane-aggregate-${{ github.run_id }}
          path: |
            security/sarif/aggregate.sarif
            security/reports/*.json
            security/events/security-event-bus.jsonl
            security/state/remediation-queue.json
          if-no-files-found: warn
          retention-days: 90
          compression-level: 9
      - name: Release workflow lock
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: node --experimental-strip-types security/control-plane/orchestrator.ts release-lock || true
