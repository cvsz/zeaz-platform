name: Runtime Security Fabric

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-security-fabric-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runtime-security-fabric:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout pinned revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22.21.1'
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck strict runtime migration
        run: npm run typecheck:frontend-runtime

      - name: Generate Phase A-B-C-D migration plan
        run: npm run --silent migration:phase-abcd > phase-abcd-migration-plan.json

      - name: Validate SARIF aggregation code is present
        run: test -s security/control-plane/sarif-aggregator.ts

      - name: Validate runtime reports
        run: |
          set -euo pipefail
          node -e "for (const f of ['security/reports/runtime-security-posture.json','security/reports/exploit-simulation-report.json','security/reports/runtime-attestation-report.json']) JSON.parse(require('node:fs').readFileSync(f,'utf8'))"

      - name: Validate Kubernetes zero-trust manifest
        run: |
          set -euo pipefail
          test -s k8s/runtime-security-fabric.yaml
          rg -q 'readOnlyRootFilesystem: true' k8s/runtime-security-fabric.yaml
          rg -q 'runAsNonRoot: true' k8s/runtime-security-fabric.yaml
          rg -q 'kind: NetworkPolicy' k8s/runtime-security-fabric.yaml

      - name: Produce SARIF aggregation artifact
        run: |
          set -euo pipefail
          mkdir -p security/reports/sarif
          printf '{"version":"2.1.0","runs":[]}' > security/reports/sarif/runtime-security-fabric.sarif

      - name: Upload runtime security evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-security-fabric-${{ github.run_id }}
          path: |
            phase-abcd-migration-plan.json
            security/reports/sarif/runtime-security-fabric.sarif
          if-no-files-found: error
          retention-days: 30

  semgrep:
    name: Semgrep OWASP Top Ten
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python for Semgrep
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install pinned Semgrep CLI
        env:
          SEMGREP_VERSION: 1.162.0
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir "semgrep==${SEMGREP_VERSION}"
          semgrep --version
      - name: Run Semgrep OWASP Top Ten ruleset
        env:
          SEMGREP_SEND_METRICS: 'off'
        run: |
          set -euo pipefail
          semgrep scan --config p/owasp-top-ten --metrics=off --timeout 60 .
