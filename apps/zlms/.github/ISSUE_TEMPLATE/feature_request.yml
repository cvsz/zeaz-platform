name: Feature request
description: Propose a feature with problem statement, acceptance criteria, risks, and rollout needs.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for product or platform enhancements. Do not include secrets, private customer data, student records, or confidential roadmap details.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues, discussions, and roadmap items for duplicates.
          required: true
        - label: I removed secrets, PII, protected student data, and confidential customer information.
          required: true
        - label: I included measurable acceptance criteria and validation guidance.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Explain the user pain, business need, compliance requirement, or operational gap.
      placeholder: "Administrators need to bulk assign courses because..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired capability and user experience.
    validations:
      required: true
  - type: dropdown
    id: product_area
    attributes:
      label: Product area
      multiple: true
      options:
        - Web application
        - API
        - Authentication or authorization
        - Course/content management
        - Learner experience
        - Administration
        - Reporting or analytics
        - Notifications
        - Billing or subscriptions
        - Integrations/webhooks
        - Data import/export
        - CI/CD or developer experience
        - Infrastructure or Kubernetes
        - Observability/logging
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Blocking committed delivery or compliance deadline
        - P1 - High value / near-term roadmap candidate
        - P2 - Medium value / planned improvement
        - P3 - Nice to have
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Users and personas
      description: Identify affected roles and permissions.
      placeholder: "Learners, instructors, tenant administrators, support operators, platform engineers"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Provide testable requirements.
      placeholder: |
        - Given an administrator with course:write permission, when they upload a valid CSV, then assignments are created idempotently.
        - Given an invalid row, when validation runs, then the row is rejected with a safe, user-actionable error.
        - Audit logs record actor, tenant, correlation ID, and outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Summarize workarounds, rejected approaches, and tradeoffs.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security, privacy, and abuse considerations
      description: Address least privilege, input validation, output encoding, rate limiting, audit logs, tenant isolation, and data retention.
      placeholder: "Requires role-based authorization, server-side validation, idempotency keys, rate limits, and audit events."
    validations:
      required: true
  - type: textarea
    id: observability
    attributes:
      label: Observability and operations
      description: Identify required logs, metrics, traces, SLOs, alerts, runbooks, or dashboards.
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout and migration plan
      description: Include feature flags, backwards compatibility, data migrations, documentation, support readiness, and rollback strategy.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and integrations
      description: List internal services, third-party APIs, package changes, infrastructure, or compliance approvals.
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Identify unit, integration, e2e, accessibility, performance, security, and regression checks.
    validations:
      required: true
