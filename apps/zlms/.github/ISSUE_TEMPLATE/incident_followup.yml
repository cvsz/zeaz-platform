name: Incident follow-up
description: Track post-incident corrective actions, evidence, and prevention work after emergency response is complete.
title: "[Incident Follow-up]: "
labels:
  - incident-followup
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Do not use this form for active incidents. Follow the emergency response path first. Include only sanitized, post-incident information approved for issue tracking.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: The active incident has been handled through the designated incident response process.
          required: true
        - label: Sensitive indicators, secrets, PII, protected student data, and exploit details have been removed.
          required: true
        - label: Corrective actions are written as trackable engineering tasks.
          required: true
  - type: input
    id: incident_id
    attributes:
      label: Incident identifier
      description: Provide a sanitized incident, postmortem, or ticket reference.
      placeholder: "INC-2026-0001"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Incident severity
      options:
        - SEV-0 - Critical business or security impact
        - SEV-1 - Major user or service impact
        - SEV-2 - Moderate impact
        - SEV-3 - Minor impact
        - Informational / near miss
    validations:
      required: true
  - type: textarea
    id: sanitized_summary
    attributes:
      label: Sanitized summary
      description: Summarize what happened, affected capabilities, and final customer/user impact.
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: Provide sanitized timestamps and key response milestones in UTC.
      placeholder: |
        - 2026-05-08T10:00:00Z: Alert fired.
        - 2026-05-08T10:05:00Z: On-call acknowledged.
        - 2026-05-08T10:30:00Z: Mitigation deployed.
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Root cause and contributing factors
      description: Identify technical, process, monitoring, and control gaps.
    validations:
      required: true
  - type: textarea
    id: corrective_actions
    attributes:
      label: Corrective and preventive actions
      description: List action items with owners, expected evidence, and target dates when known.
      placeholder: |
        - [ ] Add regression test for idempotent retry handling. Owner: TBD. Evidence: CI test link.
        - [ ] Add alert for queue poison-message rate. Owner: TBD. Evidence: dashboard and alert rule.
    validations:
      required: true
  - type: textarea
    id: detection
    attributes:
      label: Detection and observability improvements
      description: Include logs, metrics, traces, SLOs, alert tuning, dashboards, and runbook changes.
    validations:
      required: true
  - type: textarea
    id: customer_comms
    attributes:
      label: Communication and documentation updates
      description: Note status page updates, customer notifications, support macros, docs, or runbook updates if applicable.
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Explain how completion will be verified and how recurrence risk will be measured.
    validations:
      required: true
