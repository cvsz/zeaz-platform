version: '3.8'

name: zeaz-omega

services:
  zeaz-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeaz-orchestrator
    ports:
      - "8799:8799"
    environment:
      - NODE_ENV=production
      - ZEAZ_LOG_LEVEL=info
      - ZEAZ_ENABLE_HEALTH_CHECKS=true
      - ZEAZ_AUTO_SYNC_MCP=true
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://zeaz:zeaz@postgres:5432/zeaz
    volumes:
      - zeaz_memory:/app/memory
      - zeaz_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeaz-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8799/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: zeaz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - zeaz-net

  postgres:
    image: postgres:16-alpine
    container_name: zeaz-postgres
    environment:
      - POSTGRES_DB=zeaz
      - POSTGRES_USER=zeaz
      - POSTGRES_PASSWORD=zeaz
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeaz -d zeaz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - zeaz-net

  zeaz-runtime-python:
    build:
      context: ../../runtime
      dockerfile: Dockerfile
    container_name: zeaz-runtime-py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ../../runtime:/app/runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeaz-net

volumes:
  zeaz_memory:
  zeaz_data:
  redis_data:
  postgres_data:

networks:
  zeaz-net:
    driver: bridge
