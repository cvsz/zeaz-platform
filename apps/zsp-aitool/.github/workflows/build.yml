name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-artifacts:
    name: ci / build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zsp_aitool?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zsp_aitool_shadow?schema=public
      AUTH_SECRET: ci-secret
      OPENAI_API_KEY: ci-placeholder
      HYPERFRAMES_RENDER_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zsp_aitool?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zsp_aitool_shadow?schema=public
          AUTH_SECRET: ci-secret
          OPENAI_API_KEY: ci-placeholder
          HYPERFRAMES_RENDER_ENABLED: "false"
        run: npm run build
