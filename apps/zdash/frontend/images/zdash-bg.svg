<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400" role="img" aria-labelledby="title desc">
  <title id="title">zDash command background</title>
  <desc id="desc">Abstract dark dashboard background with cyan, violet, and amber orbital gradients.</desc>
  <defs>
    <radialGradient id="g1" cx="18%" cy="14%" r="58%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.48"/>
      <stop offset="45%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="84%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.42"/>
      <stop offset="46%" stop-color="#7c3aed" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="78%" cy="78%" r="52%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.30"/>
      <stop offset="42%" stop-color="#ea580c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#e2e8f0" opacity="0.16"/>
    </pattern>
    <pattern id="lines" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="2400" height="1400" fill="#020617"/>
  <rect width="2400" height="1400" fill="url(#g1)"/>
  <rect width="2400" height="1400" fill="url(#g2)"/>
  <rect width="2400" height="1400" fill="url(#g3)"/>
  <rect width="2400" height="1400" fill="url(#lines)" opacity="0.92"/>
  <rect width="2400" height="1400" fill="url(#dots)" opacity="0.78"/>

  <g filter="url(#blur)" opacity="0.44">
    <ellipse cx="530" cy="260" rx="320" ry="90" fill="#22d3ee"/>
    <ellipse cx="1870" cy="260" rx="350" ry="105" fill="#8b5cf6"/>
    <ellipse cx="1740" cy="1090" rx="310" ry="100" fill="#f59e0b"/>
  </g>

  <g fill="none" stroke="url(#grid)" stroke-width="2" opacity="0.36">
    <path d="M177 1036 C529 734 773 1147 1146 790 C1519 433 1726 826 2152 451"/>
    <path d="M128 457 C514 197 817 659 1218 401 C1619 142 1845 511 2258 234" opacity="0.75"/>
    <path d="M254 1181 C684 917 1026 1320 1393 987 C1760 654 1918 1012 2262 750" opacity="0.62"/>
  </g>

  <g opacity="0.52">
    <circle cx="381" cy="291" r="4" fill="#67e8f9"/>
    <circle cx="707" cy="772" r="3" fill="#c4b5fd"/>
    <circle cx="1172" cy="426" r="5" fill="#fef3c7"/>
    <circle cx="1639" cy="876" r="4" fill="#67e8f9"/>
    <circle cx="2020" cy="329" r="3" fill="#f0abfc"/>
    <circle cx="2189" cy="1084" r="5" fill="#fde68a"/>
  </g>

  <rect width="2400" height="1400" fill="#020617" opacity="0.38"/>
  <rect width="2400" height="1400" fill="url(#grid)" opacity="0.08"/>
</svg>
