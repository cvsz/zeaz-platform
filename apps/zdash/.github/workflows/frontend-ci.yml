name: frontend-ci

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps --no-audit --fund=false

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc -p tsconfig.build.json --pretty false

      - name: Lint if configured
        run: |
          cd frontend
          if npm run | grep -q " lint"; then npm run lint; else echo "lint script not configured"; fi

      - name: Test
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build
