<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">zLinebot Architecture</title>
  <desc id="desc">User to LINE to Edge to API Gateway to Services, ML, Data, and Infra layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" rx="20" fill="url(#bg)"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#E2E8F0" font-size="22" font-weight="700">
    <text x="60" y="62">zLinebot System Flow</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="16" fill="#CBD5E1">
    <text x="60" y="95">User → LINE → Cloudflare Edge → API Gateway → Service / ML / Data / Infra</text>
  </g>

  <g stroke="#475569" stroke-width="1.5">
    <rect x="60" y="130" width="180" height="70" rx="14" fill="url(#card)"/>
    <rect x="280" y="130" width="180" height="70" rx="14" fill="url(#card)"/>
    <rect x="500" y="130" width="220" height="70" rx="14" fill="url(#card)"/>
    <rect x="760" y="130" width="220" height="70" rx="14" fill="url(#card)"/>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#F8FAFC">
    <text x="118" y="173">👤 User</text>
    <text x="330" y="173">📱 LINE</text>
    <text x="530" y="173">☁️ Cloudflare Edge</text>
    <text x="794" y="173">⚙️ API Gateway</text>
  </g>

  <g stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round">
    <path d="M241 165H279"/>
    <path d="M461 165H499"/>
    <path d="M721 165H759"/>
  </g>

  <g stroke="#475569" stroke-width="1.5">
    <rect x="60" y="260" width="260" height="280" rx="16" fill="url(#card)"/>
    <rect x="350" y="260" width="260" height="280" rx="16" fill="url(#card)"/>
    <rect x="640" y="260" width="260" height="280" rx="16" fill="url(#card)"/>
    <rect x="930" y="260" width="210" height="280" rx="16" fill="url(#card)"/>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F1F5F9">
    <text x="130" y="295">Service Layer</text>
    <text x="438" y="295">ML Layer</text>
    <text x="720" y="295">Data Layer</text>
    <text x="990" y="295">Infra</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="15" fill="#CBD5E1">
    <text x="88" y="330">• User Service</text>
    <text x="88" y="360">• Messaging Service</text>
    <text x="88" y="390">• Recommendation</text>
    <text x="88" y="420">• Billing &amp; Identity</text>

    <text x="378" y="330">• Ranking Model</text>
    <text x="378" y="360">• RL Agent</text>
    <text x="378" y="390">• Personalization</text>
    <text x="378" y="420">• Feature Store</text>

    <text x="668" y="330">• OLTP: PostgreSQL</text>
    <text x="668" y="360">• OLAP: Warehouse</text>
    <text x="668" y="390">• Streaming: Flink</text>
    <text x="668" y="420">• Event Bus: Kafka</text>

    <text x="958" y="330">• Kubernetes</text>
    <text x="958" y="360">• Service Mesh</text>
    <text x="958" y="390">• Edge + CDN</text>
    <text x="958" y="420">• CI/CD</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94A3B8">
    <text x="60" y="585">AI Infrastructure Platform • Startup-ready • VC-ready • System-ready</text>
  </g>
</svg>
