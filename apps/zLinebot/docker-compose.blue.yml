version: "3.9"

services:
  api:
    container_name: zlinebot_api_blue
    build:
      context: ./app
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      - postgres
      - redis

  worker:
    container_name: zlinebot_worker_blue
    build:
      context: ./app
    command: ["npm", "run", "worker"]
    env_file: .env
    depends_on:
      - redis

  postgres:
    image: postgres:15
    container_name: zlinebot_postgres
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - zlinebot_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zlinebot_redis
    volumes:
      - zlinebot_redis:/data

volumes:
  zlinebot_pg:
  zlinebot_redis:
