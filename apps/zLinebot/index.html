<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zLinebot</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617 65%);
        color: white;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 20px;
      }

      .hero {
        text-align: center;
        padding: 100px 0 40px;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 72px);
        line-height: 1;
        background: linear-gradient(90deg, #8b5cf6, #ec4899);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .tag {
        margin-top: 18px;
        font-size: clamp(18px, 2.5vw, 24px);
        opacity: 0.86;
      }

      .subtag {
        margin-top: 8px;
        font-size: 16px;
        opacity: 0.75;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-top: 50px;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: transform 0.3s ease, border-color 0.3s ease;
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: #8b5cf6;
      }

      .architecture {
        width: 100%;
        margin-top: 60px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>zLinebot</h1>
        <p class="tag">AI-Native Infrastructure Platform</p>
        <p class="subtag">Messaging → AI → ML → Cloud → Web3</p>
      </section>

      <section class="grid" aria-label="Platform capabilities">
        <article class="card">🤖 LINE AI Interface</article>
        <article class="card">🧠 ML Engine</article>
        <article class="card">🌐 Cloud Native</article>
        <article class="card">⛓ Web3 Ready</article>
      </section>

      <img class="architecture" src="architecture.svg" alt="zLinebot architecture overview" />
    </main>
  </body>
</html>
