name: Cloudflare DNS Configuration

on:
  push:
    branches: [main, master]
    paths:
      - infra/cloudflare_dns.yaml
      - scripts/configure_cloudflare.sh
      - .github/workflows/cloudflare-config.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without applying DNS changes"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  configure-cloudflare:
    if: secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ZONE_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Apply Cloudflare DNS config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
        run: ./scripts/configure_cloudflare.sh infra/cloudflare_dns.yaml
