name: Codex Master Full Meta Final Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker --version
      - run: node --version
      - run: python3 --version
      - run: kubectl version --client || echo "Skipping kubeval"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm ci && npm run lint
        working-directory: app
      - run: pip install pylint && pylint **/*.py || true
      - run: shellcheck **/*.sh || true
      - run: pip install bandit && bandit -r .
      - run: docker run --rm -i hadolint/hadolint < Dockerfile
      - run: |
          curl -s https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          ./kubeval k8s/*.yaml || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
        working-directory: app
      - run: npm test -- --coverage
        working-directory: app
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/coverage/lcov.info

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t zlinebot:latest .
      - run: docker save zlinebot:latest | gzip > zlinebot.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: zlinebot-docker
          path: zlinebot.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly (if token configured)
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
      - name: Skip Fly deploy when token is missing
        if: ${{ secrets.FLY_API_TOKEN == '' }}
        run: echo "FLY_API_TOKEN not set, skipping Fly deployment."
      - name: Deploy Kubernetes manifests (if kubeconfig configured)
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          kubectl apply -f k8s/
      - name: Skip Kubernetes deploy when kubeconfig is missing
        if: ${{ secrets.KUBECONFIG == '' }}
        run: echo "KUBECONFIG secret not set, skipping kubectl apply."
      - name: Publish Cloudflare worker (if API token configured)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler publish
      - name: Skip Cloudflare publish when token is missing
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN not set, skipping wrangler publish."

  versioning:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v6
      - run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

  release:
    runs-on: ubuntu-latest
    needs: [validate, lint, test, build, deploy, versioning]
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md RELEASE_NOTES.md
          else
            echo "Codex Final Release - April 2026" > RELEASE_NOTES.md
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: codex-release
          path: |
            RELEASE_NOTES.md
            app/coverage/lcov.info
            zlinebot.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            RELEASE_NOTES.md
            zlinebot.tar.gz
          tag_name: v${{ github.run_number }}
          name: "Codex Final Release v${{ github.run_number }} (2026)"
