name: Master Meta Full Release – Kubernetes + GHCR + Cloudflare

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${IMAGE_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/zlinebot:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/zlinebot:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER }}/zlinebot:${{ github.ref_name }}

  deploy-to-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${IMAGE_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Configure kubeconfig
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context

      - name: Skip deployment when kubeconfig is missing
        if: ${{ secrets.KUBECONFIG == '' }}
        run: echo "KUBECONFIG secret not set, skipping Kubernetes deployment."

      - name: Update deployment image (rolling update)
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          kubectl set image deployment/zlinebot-core zlinebot-app=ghcr.io/${IMAGE_OWNER}/zlinebot:${{ github.sha }} -n zlinebot
          kubectl rollout status deployment/zlinebot-core -n zlinebot --timeout=300s

      - name: Verify deployment
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          kubectl get pods -n zlinebot
          kubectl get ingress -n zlinebot
