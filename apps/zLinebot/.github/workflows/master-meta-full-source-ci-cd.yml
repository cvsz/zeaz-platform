name: Master Meta Full Source CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python lint tools
        run: python -m pip install --upgrade pip ruff

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run master meta full-source CI
        run: ./scripts/master_meta_full_source_ci_cd.sh ci

  cd:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_PASSWORD != ''
    needs: ci
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: ghcr.io
      DOCKER_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/zlinebot
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for deploy
        run: docker build -t zlinebot:ci .

      - name: Publish image to container registry
        env:
          DOCKER_USERNAME: ${{ github.repository_owner }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: ./scripts/master_meta_full_source_ci_cd.sh cd
