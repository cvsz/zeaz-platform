apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zlinebot
  template:
    metadata:
      labels:
        app: zlinebot
    spec:
      containers:
        - name: app
          image: yourrepo/zlinebot:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          envFrom:
            - secretRef:
                name: zlinebot-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
