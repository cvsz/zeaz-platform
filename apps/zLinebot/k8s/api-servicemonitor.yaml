apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-monitor
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - zlinebot
  selector:
    matchLabels:
      app: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: tenant_namespace
