apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zlinebot
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: zlinebot
  source:
    repoURL: https://github.com/CVSz/zLinebot
    path: k8s
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
