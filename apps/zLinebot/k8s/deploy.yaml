apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-core
  namespace: zlinebot
  labels:
    app: zlinebot
    component: core
    version: "1.0.0-final-release"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zlinebot
      component: core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: zlinebot
        component: core
      annotations:
        linkerd.io/inject: enabled
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: zlinebot-app
          image: ghcr.io/${{ github.repository_owner }}/zlinebot:${{ github.sha }}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: zlinebot-config
            - secretRef:
                name: zlinebot-secrets
          resources:
            requests:
              cpu: "750m"
              memory: "1.5Gi"
            limits:
              cpu: "3000m"
              memory: "6Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zlinebot-hpa
  namespace: zlinebot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zlinebot-core
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
