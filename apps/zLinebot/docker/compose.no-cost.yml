version: "3.9"
services:
  app:
    build: ../app
    env_file: ../.env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
      - qdrant

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: strongpass
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    image: redis:7

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

volumes:
  pg:
