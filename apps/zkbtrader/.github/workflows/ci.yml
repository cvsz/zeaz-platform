name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests
      - name: Typecheck
        run: mypy src
      - name: Test
        run: pytest

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Bandit
        run: bandit -q -r src
      - name: Dependency audit
        run: pip-audit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile.api -t zkbtrader-api:ci .
      - name: Build worker image
        run: docker build -f Dockerfile.worker -t zkbtrader-worker:ci .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
