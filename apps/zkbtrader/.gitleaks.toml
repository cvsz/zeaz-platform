title = "ZKBTrader gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = "exclude local, vendor, cache, and generated paths"
paths = [
  '''(^|/)\.venv(/|$)''',
  '''(^|/)venv(/|$)''',
  '''(^|/)node_modules(/|$)''',
  '''(^|/)\.vendor(/|$)''',
  '''(^|/)reports/ecc(/|$)''',
  '''(^|/)__pycache__(/|$)''',
  '''(^|/)\.pytest_cache(/|$)''',
  '''(^|/)\.mypy_cache(/|$)''',
  '''(^|/)\.ruff_cache(/|$)''',
  '''(^|/)htmlcov(/|$)''',
  '''(^|/)dist(/|$)''',
  '''(^|/)build(/|$)''',
  '''(^|/)\.git(/|$)''',
]
