# Dependabot config — https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Bun / npm JS dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      next:
        patterns: ["next", "eslint-config-next"]
      radix:
        patterns: ["@radix-ui/*"]
      prisma:
        patterns: ["prisma", "@prisma/client"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "tw-animate-css", "tailwind-merge", "tailwindcss-animate"]
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    ignore:
      # Don't auto-bump majors for Next.js — handle manually
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # TypeScript majors can break builds
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "chore"
    reviewers:
      - "zai/zlm-cli-maintainers"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "zai/zlm-cli-maintainers"
