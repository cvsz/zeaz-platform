apiVersion: apps/v1
kind: Deployment
metadata:
  name: zwallet-gateway
  labels:
    app: zwallet-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zwallet-gateway
      track: blue
  template:
    metadata:
      labels:
        app: zwallet-gateway
        track: blue
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/zwallet-gateway:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
