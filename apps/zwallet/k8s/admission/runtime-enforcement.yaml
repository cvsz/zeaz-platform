# k8s/admission/runtime-enforcement.yaml
# Full zero-trust runtime enforcement (Cosign + Kyverno)

---
apiVersion: v1
kind: Namespace
metadata:
  name: security-system

---
# Kyverno policy: block unsigned images + enforce digest pinning
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-signed-images
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-digest
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Images must use immutable digest (no tags allowed)"
        pattern:
          spec:
            containers:
              - image: "*@sha256:*"

    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - image: "ghcr.io/cvsz/zwallet/api:*"
          keyless:
            subject: "repo:CVSz/zwallet"
            issuer: "https://token.actions.githubusercontent.com"

---
# Runtime drift detection (Falco)
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-rules
  namespace: security-system
data:
  custom-rules.yaml: |
    - rule: Detect Container Drift
      desc: Detect file system changes in running container
      condition: container and evt.type in (open,openat,creat) and fd.name startswith "/app"
      output: "Container drift detected (file=%fd.name)"
      priority: WARNING

---
# Falco DaemonSet (runtime security)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: security-system
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
    spec:
      containers:
        - name: falco
          image: falcosecurity/falco:latest
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev-fs
              mountPath: /host/dev
            - name: proc-fs
              mountPath: /host/proc
            - name: boot-fs
              mountPath: /host/boot
      volumes:
        - name: dev-fs
          hostPath:
            path: /dev
        - name: proc-fs
          hostPath:
            path: /proc
        - name: boot-fs
          hostPath:
            path: /boot

---
# Quarantine controller (label-based isolation)
apiVersion: v1
kind: ConfigMap
metadata:
  name: quarantine-script
  namespace: security-system
data:
  quarantine.sh: |
    #!/bin/sh
    kubectl label pod $1 quarantine=true --overwrite
    kubectl annotate pod $1 security=isolated --overwrite

---
# NetworkPolicy: isolate quarantined pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quarantine-isolation
  namespace: default
spec:
  podSelector:
    matchLabels:
      quarantine: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
