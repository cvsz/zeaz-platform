apiVersion: apps/v1
kind: Deployment
metadata:
  name: zwallet-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zwallet-gateway
  template:
    metadata:
      labels:
        app: zwallet-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/zwallet-gateway:0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zwallet-secrets
                  key: db_url
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: zwallet-gateway
spec:
  selector:
    app: zwallet-gateway
  ports:
    - port: 80
      targetPort: 8080
