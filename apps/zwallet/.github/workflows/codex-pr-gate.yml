name: Codex PR Gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Codex Audit
        id: codex
        uses: openai/codex-action@main
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are auditing a fintech system.

            HARD RULES:
            - Reject if ledger invariant violated
            - Reject if no idempotency
            - Reject if env secrets used
            - Reject if security pipeline bypassed

            Output JSON:
            { "status": "PASS" | "FAIL", "reason": "..." }

      - name: Enforce Result
        run: |
          if grep -q '"status": "FAIL"' <<< "${{ steps.codex.outputs.final-message }}"; then
            echo "❌ Codex audit failed"
            exit 1
          fi
