# .github/workflows/supply-chain.yml
name: Supply Chain Security

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-secure:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api:secure ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:secure
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.15.3
        with:
          image: ghcr.io/${{ github.repository }}/api:secure
          format: cyclonedx-json
          output-file: sbom.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Sign image (cosign keyless)
        uses: sigstore/cosign-installer@v3

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/api:secure

      - name: Cosign sign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}/api:secure)
          cosign sign --yes "${DIGEST}"
