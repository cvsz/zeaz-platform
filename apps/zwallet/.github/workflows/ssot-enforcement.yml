name: SSOT Enforcement

on:
  pull_request:

jobs:
  ssot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden patterns
        run: |
          if grep -R "process.env" .; then
            echo "❌ Env secrets not allowed"
            exit 1
          fi

          if grep -R "x-client-cert" .; then
            echo "❌ Header trust violation"
            exit 1
          fi
