name: DevOps CI/CD

permissions:
  id-token: write
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, wallet-service, portfolio-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image owner to lowercase
        id: image_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.owner }}/zwallet-${{ matrix.service }}:${{ github.sha }}

  deploy-blue-green:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: default
    steps:
      - uses: actions/checkout@v4
      - name: Validate required deployment variables
        id: deploy_vars
        run: |
          set -e
          if [ -z "$AWS_REGION" ] || [ -z "$EKS_CLUSTER_NAME" ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deployment because AWS_REGION or EKS_CLUSTER_NAME is not configured."
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS credentials via OIDC
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::171518635073:role/github-oidc-zwallet
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure kubectl
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        uses: azure/setup-kubectl@v4
      - name: Debug AWS identity
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          set -e
          aws sts get-caller-identity

      - name: Validate EKS cluster exists
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          set -e
          if ! aws eks describe-cluster --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "::error::EKS cluster '$EKS_CLUSTER_NAME' was not found in region '$AWS_REGION'."
            echo "Available EKS clusters in $AWS_REGION:"
            aws eks list-clusters --region "$AWS_REGION" --query "clusters" --output text || true
            exit 1
          fi
      - name: Update kubeconfig (ephemeral)
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          set -euo pipefail
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${EKS_CLUSTER_NAME:?EKS_CLUSTER_NAME is required}"
          : "${K8S_NAMESPACE:=default}"
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context
      - name: Verify cluster access
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: kubectl get nodes
      - name: Deploy green
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/base -n "$K8S_NAMESPACE"
          kubectl patch service zwallet-gateway -n "$K8S_NAMESPACE" -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"green"}}}'
      - name: Validate rollout
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: kubectl rollout status deploy/zwallet-gateway -n "$K8S_NAMESPACE" --timeout=180s
      - name: Chaos Test
        if: steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f infra/chaos/chaos-pipeline.yaml -n "$K8S_NAMESPACE"
          kubectl wait --for=condition=complete job/chaos-verification-pipeline -n "$K8S_NAMESPACE" --timeout=300s
      - name: Rollback on failure
        if: failure() && steps.deploy_vars.outputs.deploy_enabled == 'true'
        run: |
          set -euo pipefail
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${EKS_CLUSTER_NAME:?EKS_CLUSTER_NAME is required}"
          : "${K8S_NAMESPACE:=default}"
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context
          kubectl rollout undo deploy/zwallet-gateway -n "$K8S_NAMESPACE"
          kubectl patch service zwallet-gateway -n "$K8S_NAMESPACE" -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"blue"}}}'
