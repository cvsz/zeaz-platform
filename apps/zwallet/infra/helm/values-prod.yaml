api:
  replicaCount: 5
  resources:
    limits:
      cpu: 1
      memory: 1Gi

postgresql-ha:
  enabled: true
  postgresql:
    password: securepassword
  persistence:
    size: 50Gi

redis:
  architecture: cluster
  cluster:
    nodes: 6
  master:
    persistence:
      size: 10Gi

kafka:
  replicaCount: 3
  persistence:
    size: 20Gi

ingress:
  enabled: true
  className: nginx
  tls:
    - hosts:
        - zwallet.local
      secretName: zwallet-tls
