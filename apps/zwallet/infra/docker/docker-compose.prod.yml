version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - zwallet
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  api:
    <<: *service-defaults
    build:
      context: ../../api
      dockerfile: Dockerfile
    image: zwallet/api:latest
    environment:
      APP_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"

  swap-engine:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/swap-engine
        SERVICE_NAME: swap-engine
    image: zwallet/swap-engine:latest
    environment:
      NODE_ENV: production
      PORT: 8092
    ports:
      - "8092:8092"

  card:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/card
        SERVICE_NAME: card
    image: zwallet/card:latest
    environment:
      NODE_ENV: production
      PORT: 8096
    ports:
      - "8096:8096"

  compliance:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/compliance
        SERVICE_NAME: compliance
    image: zwallet/compliance:latest
    environment:
      NODE_ENV: production
      PORT: 8097
    ports:
      - "8097:8097"

  indexer:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/indexer
        SERVICE_NAME: indexer
    image: zwallet/indexer:latest
    environment:
      NODE_ENV: production
      PORT: 8093
    ports:
      - "8093:8093"

  liquidity:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/liquidity
        SERVICE_NAME: liquidity
    image: zwallet/liquidity:latest
    environment:
      NODE_ENV: production
      PORT: 8098
    ports:
      - "8098:8098"

  router:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/router
        SERVICE_NAME: router
    image: zwallet/router:latest
    environment:
      NODE_ENV: production
      PORT: 8099
    ports:
      - "8099:8099"

  event-workers:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/event-workers
        SERVICE_NAME: event-workers
    image: zwallet/event-workers:latest
    environment:
      NODE_ENV: production
      PORT: 8100

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  elasticsearch:
    <<: *service-defaults
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"

  logstash:
    <<: *service-defaults
    image: docker.elastic.co/logstash/logstash:8.15.3
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    <<: *service-defaults
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

networks:
  zwallet:
    driver: bridge
