version: '3.9'

services:
  gateway:
    image: ghcr.io/example/zwallet-gateway:${IMAGE_TAG:-latest}
    build:
      context: ../../backend
      dockerfile: services/gateway/Dockerfile
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      PORT: 8080
    depends_on:
      - redis
      - postgres

  wallet-service:
    image: ghcr.io/example/zwallet-wallet-service:${IMAGE_TAG:-latest}
    build:
      context: ../../backend
      dockerfile: services/wallet-service/Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - redis

  portfolio-service:
    image: ghcr.io/example/zwallet-portfolio-service:${IMAGE_TAG:-latest}
    build:
      context: ../../backend
      dockerfile: services/portfolio-service/Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - redis

  tx-orchestrator:
    image: ghcr.io/example/zwallet-tx-orchestrator:${IMAGE_TAG:-latest}
    build:
      context: ../../backend
      dockerfile: services/tx-orchestrator/Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - nats

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zwallet
      POSTGRES_USER: zwallet
      POSTGRES_PASSWORD: zwallet
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  nats:
    image: nats:2.11-alpine
    command: ["-js"]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../../k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - '9200:9200'

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    ports:
      - '5044:5044'
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    ports:
      - '5601:5601'
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
