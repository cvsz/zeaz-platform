apiVersion: apps/v1
kind: Deployment
metadata:
  name: zwallet-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zwallet-api
  template:
    metadata:
      labels:
        app: zwallet-api
    spec:
      containers:
        - name: api
          image: zwallet/api:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zwallet-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zwallet-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
