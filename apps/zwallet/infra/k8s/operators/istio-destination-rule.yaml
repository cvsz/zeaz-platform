apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: zwallet-default
  namespace: zwallet
spec:
  host: "*.zwallet.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 5s
      baseEjectionTime: 30s
