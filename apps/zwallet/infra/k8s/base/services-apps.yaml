apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: zwallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: zwallet/api:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: zwallet
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swap-engine
  namespace: zwallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swap-engine
  template:
    metadata:
      labels:
        app: swap-engine
    spec:
      containers:
        - name: swap-engine
          image: zwallet/swap-engine:latest
          ports:
            - containerPort: 8092
---
apiVersion: v1
kind: Service
metadata:
  name: swap-engine
  namespace: zwallet
spec:
  selector:
    app: swap-engine
  ports:
    - port: 8092
      targetPort: 8092
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: zwallet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
