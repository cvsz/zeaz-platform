apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: zwallet
spec:
  serviceName: redis
  replicas: 6
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["--cluster-enabled","yes"]
          ports:
            - containerPort: 6379
