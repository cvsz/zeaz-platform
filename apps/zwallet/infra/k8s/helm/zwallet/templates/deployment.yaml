apiVersion: apps/v1
kind: Deployment
metadata:
  name: zwallet-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: zwallet-api
  template:
    metadata:
      labels:
        app: zwallet-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zwallet-secrets
                  key: db_url
