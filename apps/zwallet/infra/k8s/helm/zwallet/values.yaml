replicaCount: 3

image:
  repository: ghcr.io/cvsz/zwallet/api
  tag: secure

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  hosts:
    - host: zwallet.local
      paths:
        - /

postgres:
  enabled: true
  replicaCount: 2

redis:
  enabled: true
  cluster: true

vault:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
