apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zwallet
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zwallet
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
