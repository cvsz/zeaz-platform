version: 2

project_name: terraform-provider-zeaz

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-zeaz
    binary: "{{ .ProjectName }}_v{{ .Version }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm64

archives:
  - id: terraform-provider-zeaz
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - id: gpg
    artifacts: checksum
    cmd: gpg
    args:
      - --batch
      - --yes
      - --pinentry-mode
      - loopback
      - --passphrase
      - "{{ .Env.PASSPHRASE }}"
      - --local-user
      - "{{ .Env.GPG_KEY_ID }}"
      - --output
      - "${signature}"
      - --detach-sign
      - "${artifact}"

release:
  github:
    owner: cvsz
    name: terraform-provider-zeaz
  draft: false
  prerelease: auto

changelog:
  use: github
