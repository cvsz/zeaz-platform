# ZEAZ Platform canonical reverse proxy map.
# Include from nginx.conf inside an http {} context.
map $http_upgrade $zeaz_connection_upgrade {
    default upgrade;
    '' close;
}

upstream zeaz_openwork { server 127.0.0.1:4101; }
upstream zeaz_api { server 127.0.0.1:4102; }
upstream zeaz_web { server 127.0.0.1:4103; }
upstream zeaz_zoffice { server 127.0.0.1:4104; }
upstream zeaz_zwallet { server 127.0.0.1:4105; }
upstream zeaz_ztrader { server 127.0.0.1:4106; }
upstream zeaz_zdash { server 127.0.0.1:4107; }
upstream zeaz_zsp_aitool { server 127.0.0.1:4108; }
upstream zeaz_zveo { server 127.0.0.1:4109; }
upstream zeaz_zsticker { server 127.0.0.1:4110; }
upstream zeaz_zcino { server 127.0.0.1:4111; }
upstream zeaz_zlms_prod { server 127.0.0.1:4112; }

# Common proxy settings are repeated intentionally for portability.
server { listen 80; server_name zow.zeaz.dev; client_max_body_size 25m; location / { proxy_pass http://zeaz_openwork; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $zeaz_connection_upgrade; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }
server { listen 80; server_name api-zcfdash.zeaz.dev; client_max_body_size 25m; location / { proxy_pass http://zeaz_api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $zeaz_connection_upgrade; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }
