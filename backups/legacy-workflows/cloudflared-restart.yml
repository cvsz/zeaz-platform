name: Cloudflared Configuration Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflared-config-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}
      - name: Validate tunnel configuration before restart operations
        run: bash scripts/tunnel-validate.sh --offline
