name: Rotate Secrets

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      confirm_rotate:
        description: 'Type yes to run live token rotation'
        required: true
        default: 'no'

permissions:
  contents: read

concurrency:
  group: rotate-secrets-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  rotate-secrets:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Validate shell scripts syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -I{} bash -n {}

      - name: Scheduled dry-run rotation audit
        if: ${{ github.event_name == 'schedule' }}
        run: bash scripts/cloudflare/clean-and-regenerate-tokens.sh --dry-run --cleanup-only

      - name: Manual live rotation
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_rotate == 'yes' }}
        run: bash scripts/cloudflare/clean-and-regenerate-tokens.sh --yes --regenerate --types all --backup --write .env.cloudflare

      - name: Manual rotation skipped (confirmation missing)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_rotate != 'yes' }}
        run: |
          echo "Rotation skipped: set confirm_rotate=yes when dispatching this workflow."
          exit 1
