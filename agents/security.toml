[agent]
name = "security"
role = "Security Auditor"
description = "Runs SAST, DAST, and secret scanning on all changes."
capabilities = ["Self-Audit", "Self-Heal"]
loop_interval = "15m"

[tools]
enabled = ["trivy", "gitleaks", "checkov", "tfsec", "semgrep"]

[observability]
metrics = ["prometheus"]
